 增 加 ， 或 是 新 產 生 的 bone lesion(s) 或 新 plasmacytoma，則僅需1次評估)： i.若前一線治療中 M component 最低值≧5g/dL，血清 M 蛋白需增加≧1g/dL； 若前一線治療中 M component 最低值＜5g/dL，血清 M 蛋白需增加 ≧0.5g/dL。 ii.Urine M-protein 需增加≧0.2gm/24Hr，且需較前一線治療中的最低值增 加≧25%。 iii.在 non-secretary myeloma 病患，骨髓漿細胞(plasmacells)之比例絕對 值增加≧10%，且需較前一線治療中的最低值增加≧25%。 iv.新產生的 bone lesion(s)或 plasmacytoma；且須經病理切片證實。 v.Plasmacytoma 體積增加≧50%。 vi.周邊血液中漿細胞比例≧20%或漿細胞絕對值≧2000 cells/μL。 II.出現下列任一臨床症狀： i.新產生的 bone lesion(s)或 plasmacytoma；且須經病理切片證實。 ii.Plasmacytoma 體積增加≧50%。 iii.高血鈣(corrected serumcalcium＞11.0mg/dL 或2.75mmol/L)。 iv.貧血(Hemoglobin 下降幅度≧2gm/dL 且無其他原因可以解釋)。 v.腎功能惡化(eGFR 需下降幅度≧25%)，且無其他原因可以解釋。 vi.出現其他 end-organ dysfunctions。"},{"num":"(2)","text":"再次申請時必須確定 paraprotein(M-protein)未上升(即表示對藥物有反應或為 穩定狀態)；或對部分 non-secretory type MM 病人以骨髓檢查 plasma cell 為療 效依據，證明為對藥物有反應或為穩定狀態，方可繼續使用。續用時的申請每次 以4個療程為限。"},{"num":"(3)","text":"每人終生以8個療程為上限。"}]}],"per_cancer":null,"common_data":null,"st":"selinexor xpovio 與 bortezomib 及 dexamethasone 合併使用於先前已接受至少2種治療失敗之多發性骨 髓瘤病人，且須具有良好日常體能狀態(ecog<2)者。 須經事前審查核准後使用： 初次申請以4個療程(每療程為5週)為限，且需同時符合下列ⅰ.與ⅱ.的條件： i.具有下列任一疾病惡化的指標：病患開始治療前須在連續2次評估中均符合同一 指 標 ( 但 若 為 plamacytoma 體 積 增 加 ， 或 是 新 產 生 的 bone lesion(s) 或 新 plasmacytoma，則僅需1次評估)： i.若前一線治療中 m component 最低值≧5g/dl，血清 m 蛋白需增加≧1g/dl； 若前一線治療中 m component 最低值＜5g/dl，血清 m 蛋白需增加 ≧0.5g/dl。 ii.urine m-protein 需增加≧0.2gm/24hr，且需較前一線治療中的最低值增 加≧25%。 iii.在 non-secretary myeloma 病患，骨髓漿細胞(plasmacells)之比例絕對 值增加≧10%，且需較前一線治療中的最低值增加≧25%。 iv.新產生的 bone lesion(s)或 plasmacytoma；且須經病理切片證實。 v.plasmacytoma 體積增加≧50%。 vi.周邊血液中漿細胞比例≧20%或漿細胞絕對值≧2000 cells/μl。 ii.出現下列任一臨床症狀： i.新產生的 bone lesion(s)或 plasmacytoma；且須經病理切片證實。 ii.plasmacytoma 體積增加≧50%。 iii.高血鈣(corrected serumcalcium＞11.0mg/dl 或2.75mmol/l)。 iv.貧血(hemoglobin 下降幅度≧2gm/dl 且無其他原因可以解釋)。 v.腎功能惡化(egfr 需下降幅度≧25%)，且無其他原因可以解釋。 vi.出現其他 end-organ dysfunctions。 再次申請時必須確定 paraprotein(m-protein)未上升(即表示對藥物有反應或為 穩定狀態)；或對部分 non-secretory type mm 病人以骨髓檢查 plasma cell 為療 效依據，證明為對藥物有反應或為穩定狀態，方可繼續使用。續用時的申請每次 以4個療程為限。 每人終生以8個療程為上限。"},{"num":"9.118","name":"Elran /* ── 基因／生物標記「具名」萃取（單一真相源；master 報表亦引用同規則）──
   設計原則：latin gene token 一律區分大小寫並加 \b 邊界，避免 eGFR(腎)／VEGFR 子字串誤判；
   標籤為「要附哪個檢測」之中性語意（不分需突變陽性或需原生型），符合個管師實際備件工作；
   逐條(per-clause)呼叫即自動分流到各適應症所需項目。 */
function geneDocs(t){
  const out=[];
  if(/\bEGFR\b/.test(t) && /EGFR[^。]{0,12}(?:突變|Exon|外顯子|L858R|T790M|表現型|活化|原生型|插入)|(?:Exon|外顯子)\s*\d+[^。]{0,6}(?:EGFR|突變)/i.test(t)){
    const q=[];
    if(/T790M/i.test(t))q.push('T790M');
    if(/(?:Exon|外顯子)\s*20[^。]{0,10}插入|exon\s*20\s*insertion/i.test(t))q.push('Exon 20 插入');
    if(/(?:Exon|外顯子)\s*19|L858R|Exon\s*21|19\s*Del/i.test(t))q.push('Exon 19 Del／L858R');
    out.push('EGFR 基因突變檢測'+(q.length?('（'+q.join('、')+'）'):''));
  }
  if(/MET\s*(?:exon|外顯子)\s*14/i.test(t))out.push('MET Exon 14 跳讀突變檢測');
  if(/BRAF/.test(t))out.push(/V600E/.test(t)?'BRAF 基因突變檢測（V600E）':'BRAF 基因突變檢測（V600）');
  if(/All-?RAS|K-?RAS|N-?RAS|\bRAS\b/.test(t))out.push('All-RAS 基因突變分析');
  if(/\bALK\b/.test(t))out.push('ALK 基因檢測');
  if(/ROS-?1/.test(t))out.push('ROS-1 基因檢測');
  if(/NTRK/.test(t))out.push('NTRK 基因融合檢測');
  if(/PIK3CA/.test(t))out.push(/AKT1|PTEN/.test(t)?'PIK3CA／AKT1／PTEN 任一變異檢測':'PIK3CA 基因突變檢測');
  if(/FGFR2/.test(t))out.push('FGFR2 基因融合／重排檢測');
  if(/PDGFRA\s*D842V/.test(t))out.push('PDGFRA D842V 突變檢測');
  else if(/PDGFR/.test(t))out.push('PDGFR 基因重組檢測');
  if(/FLT3-?ITD/.test(t))out.push('FLT3-ITD 突變檢測');
  else if(/FLT3/.test(t))out.push('FLT3 基因突變檢測');
  if(/BRCA/.test(t))out.push('BRCA1／2 基因突變檢測（germline／somatic）');
  if(/HRD|同源重組|同源修復|基因體不穩定|genomic instability/i.test(t))out.push('HRD 同源重組缺陷檢測（或基因體不穩定）');
  if(/T315I/i.test(t))out.push('BCR-ABL T315I 突變檢測');
  if(/\bRET\b/.test(t))out.push('RET 基因檢測');
  return [...new Set(out)];
}
function markerDocs(t){
  const out=[];
  if(/PD-?L1|\bTPS\b|\bCPS\b|TC\s*[≧≥]|IC\s*[≧≥]/.test(t))out.push('PD-L1 表現量檢測（TPS／CPS／TC／IC）');
  if(/HER-?2/.test(t))out.push('HER2 檢測（IHC／FISH／ISH）');
  if(/CLDN\s*18|Claudin\s*18/i.test(t))out.push('Claudin 18.2（CLDN18.2）表現檢測（IHC）');
  if(/MSI-?H|dMMR|微衛星不穩定|錯配修復|錯誤配對修復/.test(t))out.push('MSI／MMR 檢測（微衛星不穩定／錯配修復）');
  ['CD20','CD19','CD22','CD30','CD33'].forEach(cd=>{if(new RegExp(cd+'(?!\\d)').test(t))out.push(cd+' 抗原檢測');});
  if(/17p\s*缺失|del\s*\(?\s*17p/.test(t))out.push('17p 缺失檢測（細胞遺傳學）');
  if(/IGHV/.test(t))out.push('IGHV 突變狀態檢測');
  if(/ANCA|嗜中性白血球細胞質抗體/.test(t))out.push('ANCA 抗體檢測（血管炎適應症）');
  return [...new Set(out)];
}

// ---- screen nav (desktop master-detail) ----
function isDesktop(){return window.matchMedia('(min-width:980px)').matches;}
function scrollTop(){window.scrollTo(0,0);}
function go(name){
  cur.screen=name;
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('show'));
  document.getElementById('scr-'+name).classList.add('show');
  if(name!=='clauses')document.getElementById('scr-clauses').classList.remove('detail-open');
  setStepper();
  scrollTop();
}
function setStepper(){
  const sc=cur.screen||'find';
  const idx=sc==='find'?0:sc==='drugs'?1:2;
  const detail=document.getElementById('scr-clauses').classList.contains('detail-open');
  const onPrep=sc==='clauses'&&(detail||(isDesktop()&&cur.picked!=null));
  document.querySelectorAll('#stepper .stp').forEach((el,i)=>{
    let cls='stp';
    if(onPrep){cls+=i<3?' done':i===3?' active':'';}
    else{cls+=i<idx?' done':i===idx?' active':'';}
    el.className=cls;
  });
}
document.getElementById('stepper').addEventListener('click',e=>{
  const stp=e.target.closest('.stp'); if(!stp)return;
  const name=stp.dataset.go;
  if(name==='find'){go('find');return;}
  if(name==='drugs'){if(cur.cancer||cur.entry==='search')go('drugs');return;}
  if(name==='clauses'){if(cur.drug){document.getElementById('scr-clauses').classList.remove('detail-open');go('clauses');}return;}
  if(name==='prep'){if(cur.picked!=null){if(!isDesktop())document.getElementById('scr-clauses').classList.add('detail-open');go('clauses');setStepper();}return;}
});

// direct search on screen 1
function renderSearch(q,target){
  q=q.trim().toLowerCase();
  const el=document.getElementById(target);
  if(!q){el.innerHTML='';return;}
  const scored=[];
  DRUGS.forEach(d=>{const head=(d.name+' '+d.brand+' '+d.num).toLowerCase();
    if(head.includes(q))scored.push([0,d]); else if((d.st||'').includes(q))scored.push([1,d]);});
  scored.sort((a,b)=>a[0]-b[0]);
  const hits=scored.slice(0,30);
  if(!hits.length){el.innerHTML='<div class="empty">查無此藥。試英文成分名或商品名。</div>';return;}
  const allMention=hits.every(h=>h[0]===1);
  let note='';
  if(allMention){
    note='<div class="empty" style="margin-top:10px;text-align:left;line-height:1.7">查無「'+esc(q)+'」為事審品項。OncoPA 只收<b>需事審</b>的藥；下列為條文中提及此成分者（多為併用／排除夥伴）。<br>免疫藥請改找「免疫檢查點抑制劑」。</div>';
  }else if(hits.some(h=>h[0]===1)){
    note='<div class="count" style="margin:10px 2px 0">灰底＝條文提及此成分（多為併用夥伴）；免疫藥請找「免疫檢查點抑制劑」。</div>';
  }
  el.innerHTML=hits.map(([rank,d])=>drugRow(d,rank===1,true)).join('')+note;
}

}

function pickDrug(gi,fromSearch){
  cur.drug=DRUGS[gi]; cur.picked=null; cur.checks={};
  if(fromSearch) cur.entry='search';
  const d=cur.drug;
  let cancer=cur.cancer;
  const dcancers=d.per_cancer?Object.keys(d.per_cancer):(d.cancers||[]);
  if(!cancer||!dcancers.includes(cancer)){
    if(dcancers.length===1){cur.cancer=dcancers[0];buildCards();}
    else{ // ask cancer within drug
      document.getElementById('crumb-drugs').innerHTML=`<b>${esc(d.name)}</b><span class="sep">·</span>選癌別`;
      document.getElementById('qDrugs').value=''; document.getElementById('drugsCount').textContent='此藥涵蓋多癌別，請選病人癌別';
      document.getElementById('drugList').innerHTML='<div class="cancer-grid" style="margin-top:8px">'+dcancers.map(c=>`<div class="cancer-tile" onclick="setDrugCancer(${gi},'${c}')">${c}</div>`).join('')+'</div>';
      go('drugs');

}

function getSlice(){const d=cur.drug,c=cur.cancer;if(d.per_cancer&&d.per_cancer[c])return d.per_cancer[c];return null;}
function normClause(c){return (typeof c==='string')?{header:c,subitems:[]}:(c||{header:'',subitems:[]});}
function commonGroups(d){return (d.common_data||[]).map(c=>{const nc=normClause(c);const subs=(nc.subitems||[]).map(si=>typeof si==='string'?si:((si.num?si.num+' ':'')+(si.text||si.header||'')));return subs.length?{head:nc.header||'',items:subs}:{head:'',items:[nc.header||String(c)]};});}
function clauseTitle(c){
  let hd=(c.header||'').replace(/\u3000/g,' ').replace(/\s+/g,' ').trim();
  hd=hd.replace(/[（(](?:\d{2,3}\/\d{1,2}\/\d{1,2}[、,，\s]*)+[)）]/g,'');
  const dn=(cur.drug&&cur.drug.name)||'';
  if(dn){const re=new RegExp('^'+dn.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')+'\\s*(?:[（(][^）)]*[)）])?\\s*');hd=hd.replace(re,'').trim();}
  const clip=(s,n)=>{s=(s||'').trim();if(s.length<=n)return s;let cut=s.slice(0,n);const p=cut.lastIndexOf('、');if(p>=n-6)cut=cut.slice(0,p);return cut+'…';};
  let m=hd.match(/^(.{1,28}?)(?:治療部分|部分)\s*[：:]/);
  if(m)return clip(m[1],24);
  if(/[：:]\s*$/.test(hd)&&hd.length<=26&&!/與|併用|合併|單獨使用|適用於|用於|符合|核准/.test(hd))return clip(hd.replace(/[：:]\s*$/,''),24);
  if(/^(?:經|需|須)?\s*經?\s*事前審查核?准?/.test(hd))return '事前審查共通規定';
  const subs=(c.subitems||[]).map(si=>si.text||'').join(' ');
  const full=hd+' '+subs;
  // 排除語境（不得與X / 除…以外 / 禁勿與X）剝掉，避免抓到被排除藥名
  const hdc=hd.replace(/不得與[^，。；]*/g,'').replace(/除[^，。；]*?(?:以外|外)/g,'').replace(/[禁勿]與[^，。；]*/g,'').replace(/(?:作為|用於)?(?:先前|曾經?|已)(?:接受過|使用過|施以|用過)[^。]*?(?:無效|失敗|惡化|進展|治療後|之後)/g,'');
  // 開頭動詞剝除讓疾病名浮現
  const head2=hd.replace(/^(?:(?:本藥品?|本品)?\s*(?:用於|使用於|限用於|限|適用於|適用|做為|作為|治療|給予)\s*){1,3}/,'');
  let lead=((head2.match(/^([\u4e00-\u9fffA-Za-z0-9（）()+\-]{2,18}?(?:癌|瘤|血症|白血病|淋巴瘤|骨髓瘤|病|症))/)||[])[1])||'';
  if(/適應症|^(?:下列|本|該|此|其|前述|上述)|病人$|病患$/.test(lead)||lead.length<3)lead='';
  const line=(full.match(/第[一二三四]線|[二三四]線以上|維持性?治療|術後輔助(?:治療)?|術前輔助(?:治療)?|前導性(?:治療)?|初期診斷|初診斷|急性轉化期|加速期|復發性|難治性|復發|難治/)||[])[0]||'';
  let reg='';
  const rm=hdc.split('。')[0].match(/(?:與|合併|併用)\s*(放射線療法|含[^，。、）)]{2,14}?(?:化療|療法)|[A-Za-z][A-Za-z0-9\-]+(?:\s*\/\s*[A-Za-z][A-Za-z0-9\-]+)*)/);
  if(rm)reg=rm[1].replace(/\s+/g,'');
  const bio=(full.match(/BRAF\s*V600E|EGFR\s*T790M|EGFR|RAS\s*原生型|wild[\- ]?type|HER\s*-?2|PD-?L1|Ph\+|BRCA[12\/]*/)||[])[0]||'';
  let parts=[];
  if(lead)parts.push(lead);
  if(line&&(!lead||lead.indexOf(line)<0))parts.push(line);
  if(reg&&(!lead||lead.indexOf(reg)<0))parts.push(reg);
  let t=parts.join(' · ');
  if(bio)t=t?(t+'（'+bio+'）'):bio;
  if(!t||t.length<2)t=clip(head2||hd,22);
  return clip(t,28)||'適應症';
}
function clauseText(c){c=normClause(c);let t=(c.header||'');(c.subitems||[]).forEach(s=>{t+='\n'+(s.num?s.num+' ':'')+(s.text||'');});return t.trim();}
// 判別「通用規定/敘述」而非可選送審適應症：事前審查程序、純劑量、通則十二引用、純療程上限
function isAdminClause(c){
  const hd=(c.header||'').trim();
  const full=hd+' '+((c.subitems||[]).map(si=>si.text||'').join(' '));
  const IND=/適用於|用於治療|用於[^。]*(?:第[一二三四]線|患者|病人|成人)|做為|作為|與[^。]{1,30}?(?:併用|合併使用)|單獨使用於|限[^。]{0,8}用於|第[一二三四]線治療|治療[^。]{0,30}(?:癌|瘤|白血病|淋巴瘤|骨髓瘤)/;
  if(/^(?:需|須|經)\s*經?\s*事前(?:專案)?審查核?准?(?:後|以)?使用[：:。，]?\s*$/.test(hd))return true;
  if(/^(?:需|須|經)\s*經?\s*事前(?:專案)?審查/.test(hd)&&!IND.test(full))return true;
  if(/^經事前審查核准後使用/.test(hd)&&!IND.test(full))return true;
  if(/^(?:限)?每日(?:最大|最多|最高|限用|限處方|限給付|至多)/.test(hd))return true;
  if(/無效後則?不(?:再)?給付/.test(hd)&&hd.length<70&&!IND.test(full))return true;
  if(/通則十二/.test(hd)&&/項規定/.test(hd))return true;
  if(/^每人(?:終生)?(?:至多)?.{0,8}療程.{0,6}上限/.test(hd))return true;
  const hdNs=hd.replace(/\s+/g,'');
  if(/^[A-Za-z][A-Za-z0-9\-]+與/.test(hdNs)&&/(?:僅得|僅能)擇一使用/.test(hdNs)&&/不得互換/.test(hdNs))return true;
  // V0.15.0：通用規定/限制/條件/程序 條文（與 build.py is_admin 同步）
  const ADMIN_RE=[
  /^使用限制[：:]?\s*$/,
  /^使用條件[：:]?\s*$/,
  /^使用注意事項[：:]?\s*$/,
  /^\d{2,3}年\d{1,2}月\d{1,2}日以前已核定/,
  /^不論病人處於轉移或非轉移/,
  /終生(?:僅給付|僅能接受)一種治療/,
  /^必須檢附/,
  /^需排除/,
  /^自初診斷至使用本品前/,
  /^限移植後/,
  /^限給付\d/,
  /^限單獨使用，不得/,
  /^續用/,

  for(const r of ADMIN_RE){if(r.test(hd))return true;}
  if(/(?:僅得|僅能)擇一/.test(hd)&&!IND.test(full))return true;

  if(/^除[^。]{1,20}之外/.test(hd)&&/需經事前審查/.test(hd)&&!IND.test(full))return true;
  if(/^需檢附/.test(hd)&&/通則十二/.test(hd)&&!IND.test(full))return true;

// 將條文轉成可勾選的共通規定分組（同 commonGroups 形狀）
function clauseToGroup(c){const nc=normClause(c);const subs=(nc.subitems||[]).map(si=>typeof si==='string'?si:((si.num?si.num+' ':'')+(si.text||si.header||'')));return subs.length?{head:nc.header||'',items:subs}:{head:'',items:[nc.header||'']};}

function buildCards(){
  const d=cur.drug; cur.cards=[]; cur.common=[]; cur.commonG=[]; cur.pcode=''; cur.notes=[]; cur.picked=null; cur.open=0; cur.checks={}; cur.cchecks={};
  const slice=getSlice();
  // 路由：劑型標記→非點選分隔；通用規定→共通規定可勾選區；其餘→可選適應症卡
  const routeClause=(c)=>{
    if(c._is_source_marker){cur.cards.push({kind:'marker',text:'',title:(c.header||'').replace(/[【】]/g,'').trim()});return;}
    if(isAdminClause(c)){const t=clauseText(c);if(cur.common.indexOf(t)<0){cur.common.push(t);cur.commonG.push(clauseToGroup(c));}return;}
    cur.cards.push({kind:'clause',label:'',use:'',sub:'',text:clauseText(c),title:(c._title||clauseTitle(c))});
  };
  if(slice&&(slice.single_use||slice.combo_use)){
    cur.pcode=slice.pdl1||''; cur.notes=slice.notes||[];
    const subs=slice.subtitles&&slice.subtitles.length?slice.subtitles:[''];
    (slice.single_use||[]).forEach(t=>{if(t)cur.cards.push(mkScenario(t,'single',subs));});
    (slice.combo_use||[]).forEach(t=>{if(t)cur.cards.push(mkScenario(t,'combo',subs));});
    cur.common=(d.common_data||[]).map(c=>clauseText(c)); cur.commonG=commonGroups(d);
  }else if(slice&&slice.clauses){
    cur.common=(d.common_data||[]).map(c=>clauseText(c)); cur.commonG=commonGroups(d);
    slice.clauses.forEach(routeClause);
  }else{
    cur.common=(d.common_data||[]).map(c=>clauseText(c)); cur.commonG=commonGroups(d);
    (d.items||[]).forEach(routeClause);
  }
  renderCards();
  document.getElementById('selDrug').innerHTML=`<span class="nm">${esc(d.name)}</span><span class="meta">${d.num}${ocText(d.num)}${cur.cancer?' · '+esc(cur.cancer):''} · ${d.pre_review?'需事審'+(d.form_no?' '+esc(d.form_no):''):'免事審'}</span>`;
  document.getElementById('crumb-clauses').innerHTML=`<b>${esc(d.name)}</b><span class="sep">·</span>${esc(cur.cancer||'')}<span class="pill ${d.pre_review?'pill-pr':'pill-no'}">${d.pre_review?'需事審'+(d.form_no?' '+esc(d.form_no):''):'免事審'}</span>`;
  document.getElementById('scr-clauses').classList.remove('detail-open');
  renderPrep();
  go('clauses');
}

function mkScenario(t,use,subs){
  const clean=t.replace(/\*\*/g,'');
  const m=t.match(/\*\*(.+?)\*\*/);
  const label=m?m[1].replace(/\n/g,'　'):'';
  let sub='';
  const subCore=s=>s.replace(/[（(][^）)]*[）)]/g,'').trim();  // 去掉 subtitle 括號註解，如「胃癌(不含胃腸基質瘤及神經內分泌)」→「胃癌」
  const hay=label+' '+clean.slice(0,40);
  for(const s of subs){const core=subCore(s);if(s&&(hay.includes(s)||(core&&hay.includes(core)))){sub=s;break;}}
  if(!sub)sub=subs[0]||'其他';   // 仍無命中者歸入主型態（如肺腺癌第三線→非小細胞肺癌），避免孤兒卡
  // strip leading "label:" from body to avoid repeat
  let body=clean.replace(/\n+/g,'\n').trim();
  if(label){const re=new RegExp('^'+label.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')+'\\s*[:：]?\\s*');body=body.replace(re,'').trim();}
  // 卡片顯示用短標題：去掉與型態分組標題重複的前綴、尾端單用/併用標記（避免雜訊）
  let short=label;
  if(sub&&sub!=='其他')short=short.split(sub).join('');
  short=short.replace(/[（(](單用|併用化療|併用)[)）]\s*$/,'').replace(/^[·・:：、\s]+|[·・:：、\s]+$/g,'').trim();
  // 「舊適應症」個管不易懂 → 依條文（限 109/4/1 前經審核同意、後續續用）改為明確抬頭
  if(/舊適應症/.test(label)){
    short=short.replace(/[（(]\s*舊適應症\s*[）)]/g,'').replace(/^[·・:：、\s]+|[·・:：、\s]+$/g,'').trim();
    short=(short?short+' · ':'')+'限 109/4/1 前已核准續用';
  }
  if(!short)short=label;
  return {kind:'scenario',label:label||trim1(clean).slice(0,36),short,use,sub:sub||'其他',text:body};
}

function renderCards(){
  const wrap=document.getElementById('cards');
  const chev='<svg class="chev" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="m9 18 6-6-6-6"/></svg>';
  const card=(i,head)=>`<div class="card${i===cur.open?' open':''}${i===cur.picked?' picked':''}">`
      +`<div class="card-top" onclick="toggleCard(${i})">${head}${chev}</div>`
      +`<div class="card-body"><div class="clause-text">${fmtClause(cur.cards[i].text)}</div>`
      +`<div class="card-cta" onclick="event.stopPropagation();pickCard(${i})">選這條送審 →</div></div></div>`;
  if(!cur.cards.length){
    wrap.innerHTML='<div class="empty">此藥無細部給付條文，依藥品許可證適應症使用。</div>';
  }else if(cur.cards[0].kind==='scenario'){
    // 免疫藥：兩層分組 型態（subtitle）→ 單用/併用；卡片可收合
    const order=[],byType={};
    cur.cards.forEach((c,i)=>{const t=c.sub||'其他';if(!byType[t]){byType[t]=[];order.push(t);}byType[t].push(i);});
    let html='';
    order.forEach(t=>{
      html+=`<div class="subgroup">${esc(t)}</div>`;
      [['single','單用'],['combo','併用']].forEach(([u,ul])=>{
        const items=byType[t].filter(i=>cur.cards[i].use===u);
        if(!items.length)return;
        html+=`<div class="use-head">${ul}</div>`;
        items.forEach(i=>{html+=card(i,`<div class="card-title">${esc(cur.cards[i].short||cur.cards[i].label)}</div>`);});
      });
    });
    wrap.innerHTML=html;
  }else{
    // 一般條文卡：劑型標記顯示為分隔標題（非點選），其餘依序編號、可收合
    let html='';let n=0;
    cur.cards.forEach((c,i)=>{
      if(c.kind==='marker'){html+=`<div class="subgroup">${esc(c.title)}</div>`;return;}
      n++;
      html+=card(i,`<div class="card-no">${n}</div><div class="card-title" style="font-weight:600">${esc(c.title||('適應症 '+n))}</div>`);
    });
    wrap.innerHTML=html;
  }
  // common reference
  const cr=document.getElementById('commonRef');
  if(cur.common.length){
    cr.innerHTML=`<div class="common-ref"><h3>＋ 共通給付規定（不論選哪條，都要一併符合）</h3><ul>${
      cur.common.map(t=>`<li>${esc(t).replace(/\n/g,'<br>')}</li>`).join('')}</ul></div>`;
  }else cr.innerHTML='';
}
function toggleCard(i){cur.open=(cur.open===i?-1:i);renderCards();}
function fmtClause(t){return esc(t).replace(/^(\d+[\.、])/gm,'<span class="clause-no">$1</span>').replace(/\n/g,'<br>');}

function buildDocList(){
  const c=cur.cards[cur.picked],d=cur.drug;
  let text=c.text+' '+c.label+' '+cur.pcode+' '+cur.notes.join(' ')+' '+cur.common.join(' ');
  const docs=[];
  geneDocs(text).forEach(x=>docs.push('基因檢測：'+x));
  markerDocs(text).forEach(x=>docs.push('生物標記：'+x));
  DOC_RULES.forEach(r=>{if(r.re.test(text))docs.push(r.doc);});
  cur.notes.forEach(n=>{if(NOTE_DOC_RE.test(n))docs.push('（附加）'+trim1(n));});
  let list=[...new Set(docs)];
  list.push('病歷詳實記載符合本條文之事由');
  if(d.pre_review&&d.form_no)list.unshift('填寫事審申請表（'+d.form_no+'）');
  return list;
}

function copyText(btn){
  const c=cur.cards[cur.picked],d=cur.drug;
  // 送審內容只輸出「藥名（編號）癌別 + 原始條文」。

  // 免疫情境卡的 c.label 來自母程式原文 **標記**（非萃取），且 c.text 已去標籤，故保留之。
  const lbl=(c.kind==='scenario'&&c.label)?('\n'+c.label):'';
  let t=`${d.name}（${d.num}）${cur.cancer?'　'+cur.cancer:''}${lbl}\n${c.text}`;
  if(navigator.clipboard&&navigator.clipboard.writeText){navigator.clipboard.writeText(t).then(()=>flash(btn)).catch(()=>fallbackCopy(t,btn));}
  else fallbackCopy(t,btn);
}
function fallbackCopy(t,btn){const ta=document.createElement('textarea');ta.value=t;document.body.appendChild(ta);ta.select();try{document.execCommand('copy');flash(btn);}catch(e){}ta.remove();}
function flash(btn){if(!btn)return;const o=btn.textContent;btn.textContent='已複製 ✓';setTimeout(()=>btn.textContent=o,1400);}

}

※同一基因多碼，請依報告實際變異挑選最相符者；無法唯一對應時列候選並標待確認。
- EGFR（⚠️肺癌最常用，務必用「變異層級」對照，勿用裸碼亂猜）：
    · Exon 19 deletion ........... 55764-5
    · Exon 21 L858R (c.2573T>G) .. 55766-0   ← 不要跟 T790M 搞混
    · Exon 21 L861Q (c.2582T>A) .. 55767-8
    · Exon 20 S768I (c.2303G>T) .. 55768-6
    · Exon 20 T790M (c.2369C>T) .. 55769-4（定性）／85383-8（定量 actual/normal）
    · Exon 18 G719X (c.2155/2156) 55765-2
    · Exon 20 insertion .......... 55770-2
    · 整體 EGFR 突變分析（panel/未指明特定點位）21665-5（targeted mutation analysis）／21666-3
    → 先比對報告的 c. 變化或 exon+胺基酸，挑出唯一相符者；報告只寫「EGFR mutation detected」未指明點位時，才用 21665-5。
- ALK（肺癌多為融合／重排；⚠️挑碼依「檢測方法＋事件型態」，非依點位）：
    · ALK 重排 by FISH（陽性，定性）..... 78205-2
    · ALK 重排 by FISH（敘述型 narrative） 78210-2
    · ALK 重排陽性細胞比例 by FISH（定量） 78233-4
    · EML4-ALK 融合轉錄本 by NGS/RT-PCR .. 88744-8（Molgen）／79206-9（inv(2) 融合）
    · 整體 ALK 突變分析（panel/未指明）... 100019-9
    ⚠️淋巴瘤陷阱：21787-7、21813-1、90305-4 是 t(2;5) NPM1-ALK，屬 ALCL 淋巴瘤，**肺癌絕不可用**。
    ⚠️104276-1 院內 452 筆代碼表查無，勿填。
    　突變類型欄：ALK 融合 → 選「Gene fusion transcript details(95123-6)」。
- ROS-1：院內表僅有 102038-7（ROS1 targeted mutation analysis，panel 層級）。
    報告為 ROS1 融合陽性亦填 102038-7，突變類型選「Gene fusion transcript details(95123-6)」，
    並於分析結果欄寫明融合對象（如 CD74-ROS1）。
    ⚠️104290-2、81747-8 院內 452 筆代碼表查無，勿填。
- MET（肺癌須區分「exon14 跳脫」與「擴增」）：
    · MET exon14 skipping／點突變 → 100026-4（targeted mutation analysis）
    · MET 擴增 by NGS .... 102039-5｜by FISH .... 90926-7
    · MET 拷貝數（每核）by FISH 92906-7｜MET/CEP7 比值 by FISH 92907-5
    （院內表無 exon14 專屬碼，exon14 跳脫一律歸 100026-4，變異細節寫結果欄。）
- BRAF：58415-1 或 85101-4，兩者皆為 BRAF p.Val600Glu（V600E）。
    ⚠️院內表僅有 V600E 碼；非 V600E 之 BRAF 變異無對應碼 → 標「⚠️待人工確認」。
- NTRK：93813-4
- KRAS / NRAS（院內表僅基因／panel 層級，⚠️無點位專屬碼，含肺癌 G12C）：
    · KRAS targeted mutation analysis 21702-6（最常用）／53620-1／75974-6／85509-8
    · KRAS full mutation analysis(定序) 82535-6｜KRAS gene(定序) 83059-6
    · NRAS targeted mutation analysis 21719-0／53621-9／85510-6｜NRAS gene(定序) 83060-4
    · KRAS & NRAS 合併分析 81420-2
    → 具體變異（如 G12C、G12D）填入「基因檢測結果」欄，不要硬找點位碼。
- HER2：31150-6, 42783-1, 49683-6, 74860-8, 74885-5, 85318-4, 85328-3, 96893-3
- BRCA：21639-0, 38531-0, 59041-4, 79207-7
- PD-L1：83052-1, 83054-7, 85147-7, 99064-8, 83057-0
（其餘基因以院內「#代碼系統_基因檢測代碼LOINC」452 筆完整表為準。）
（通則：給付規定所列代碼**不保證都在院內代碼表內**；凡院內表查無者一律標「⚠️待人工確認」，勿填。）

完成後自行確認：①每欄值都有報告依據、無依據者已標「⚠️待確認」；②基因 LOINC 唯一對應、
多碼未定者已標待確認；③檢測日期為民國 7 碼原樣（未誤轉西元）；④機構（CAP／外送）與外院報告連動正確。
凡①～④發現需人工判斷者，**只彙整成輸出樣板最後那一行「⚠️需人工確認」**，不要展開逐項說明。

請依「指定病人：＿＿＿＿（病歷號／姓名）」開始萃取，並**只輸出【精簡輸出樣板】那一塊**。</script>
<div class="pl-mask" id="plMask"><div class="pl-modal">
  <div class="pl-head"><h2>病摘 AI Prompt 庫</h2><button class="pl-x" onclick="plClose()">×</button></div>
  <div class="pl-tools">
    <div class="pl-row">
      <input class="pl-search" id="plQ" placeholder="搜尋 Prompt 標題／用途／內容…">
      <button class="pl-add" id="plAddBtn" onclick="plOpenForm()">＋ 匯入</button>
    </div>
    <div class="pl-cats" id="plCats"></div>
  </div>
  <div class="pl-body" id="plBody"></div>
</div></div>
<div class="pr-mask" id="prMask"><div class="pr-dlg">
  <h3>列印準備單</h3>
  <p class="pr-note">可輸入病人資訊，僅印在紙本頁首方便歸檔核對，<b>不會儲存</b>；也可留空直接列印。</p>
  <label class="pr-fld">病人姓名<input id="prName" type="text" placeholder="（可留空）" autocomplete="off"></label>
  <label class="pr-fld">病歷號<input id="prChart" type="text" placeholder="（可留空）" autocomplete="off"></label>
  <div class="pr-dlg-btns">
    <button class="btn ghost sm" onclick="closePrintDlg()">取消</button>
    <button class="btn primary sm" onclick="doPrint()">列印</button>
  </div>
</div></div>

<div class="pl-mask" id="wzMask"><div class="pl-modal">
  <div class="pl-head"><h2>操作精靈 · 手把手院內程式操作</h2><button class="pl-x" onclick="wzClose()">×</button></div>
  <div class="pl-body" id="wzBody"></div>
</div></div>
<div class="pl-toast" id="plToast"></div>
<script>
(function(){
const LS='oncopa_prompts_v1';
function builtins(){return[{id:'gene',builtin:true,title:'分子病理 → 基因報告（新增）表單萃取',cat:'基因/分子病理',
 use:'讀病人基因/分子病理報告，輸出可直接照欄填入院內「基因報告（新增）」表單的精簡值。',
 how:['複製整段 Prompt，貼入醫院病摘 AI','在 Prompt 末「指定病人」填病歷號/姓名，或接著貼上該病人報告','AI 依【精簡輸出樣板】輸出，個管照欄填表（含 LOINC、民國 7 碼日期）','需稽核時回「展開出處」，AI 才列各欄報告原文片段'],
 body:document.getElementById('pl-builtin-gene').textContent}];}
function loadC(){try{return JSON.parse(localStorage.getItem(LS)||'[]')}catch(e){return[]}}
function saveC(a){try{localStorage.setItem(LS,JSON.stringify(a))}catch(e){plToast('儲存失敗：瀏覽器封鎖本機儲存')}}
let custom=loadC(),cat='',formMode=false;
function all(){return[...builtins(),...custom];}
const esc=s=>(s||'').replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));
function plToast(m){var t=document.getElementById('plToast');t.textContent=m;t.classList.add('on');setTimeout(function(){t.classList.remove('on')},1600);}
window.plOpen=function(){document.getElementById('plMask').classList.add('on');formMode=false;plRender();};
window.plClose=function(){document.getElementById('plMask').classList.remove('on');};
window.plSetCat=function(c){cat=c;plRender();};
function plRender(){
  var box=document.getElementById('plBody');var tools=document.querySelector('.pl-tools');
  if(formMode){tools.style.display='none';box.innerHTML=plForm();return;}
  tools.style.display='';
  var q=document.getElementById('plQ').value.trim().toLowerCase();
  var cats=[...new Set(all().map(function(p){return p.cat;}).filter(Boolean))];
  document.getElementById('plCats').innerHTML='<span class="pl-chip '+(cat===''?'on':'')+'" onclick="plSetCat(\'\')">全部</span>'+cats.map(function(c){return '<span class="pl-chip '+(cat===c?'on':'')+'" onclick="plSetCat(\''+esc(c)+'\')">'+esc(c)+'</span>';}).join('');
  var items=all().filter(function(p){if(cat&&p.cat!==cat)return false;if(q){var hay=(p.title+' '+(p.use||'')+' '+(p.cat||'')+' '+p.body).toLowerCase();if(hay.indexOf(q)<0)return false;}return true;});
  if(!items.length){box.innerHTML='<div class="pl-empty">查無符合的 Prompt</div>';return;}
  box.innerHTML=items.map(function(p){
    var how=(p.how&&p.how.length)?'<ol class="pl-how">'+p.how.map(function(x){return '<li>'+esc(x)+'</li>';}).join('')+'</ol>':'';
    var mine=p.builtin?'':'<span class="pl-tag mine">我的</span>';
    var ed=p.builtin?'':'<button class="pl-mini" onclick="plEdit(\''+esc(p.id)+'\')">編輯</button><button class="pl-mini" onclick="plDel(\''+esc(p.id)+'\')">刪除</button>';
    return '<div class="pl-card"><div class="pl-ttl">'+esc(p.title)+(p.cat?' <span class="pl-tag">'+esc(p.cat)+'</span>':'')+' '+mine+'</div>'+
      (p.use?'<div class="pl-use">'+esc(p.use)+'</div>':'')+how+
      '<div class="pl-act"><button class="pl-copy" onclick="plCopy(this,\''+esc(p.id)+'\')">📋 複製整段 Prompt</button>'+
      '<button class="pl-mini" onclick="plToggle(this)">展開全文</button>'+ed+'</div>'+
      '<pre class="pl-full">'+esc(p.body)+'</pre></div>';
  }).join('');
}
function findP(id){return all().filter(function(p){return p.id===id;})[0];}
window.plToggle=function(btn){var pre=btn.closest('.pl-card').querySelector('.pl-full');pre.classList.toggle('open');btn.textContent=pre.classList.contains('open')?'收合全文':'展開全文';};
window.plCopy=function(btn,id){var p=findP(id);if(!p)return;var done=function(){btn.classList.add('done');btn.textContent='✓ 已複製，貼入病摘 AI';setTimeout(function(){btn.classList.remove('done');btn.textContent='📋 複製整段 Prompt';},1800);};
  if(navigator.clipboard&&navigator.clipboard.writeText){navigator.clipboard.writeText(p.body).then(done).catch(function(){fb(p.body,done);});}else fb(p.body,done);};
function fb(text,done){var ta=document.createElement('textarea');ta.value=text;ta.style.position='fixed';ta.style.opacity='0';document.body.appendChild(ta);ta.select();try{document.execCommand('copy');done();}catch(e){plToast('複製失敗，請手動選取');}document.body.removeChild(ta);}
function plForm(){var e=window._plEdit||{};return '<div class="pl-fld"><label>標題 *</label><input id="plf_title" value="'+esc(e.title||'')+'"></div>'+
  '<div class="pl-fld"><label>分類</label><input id="plf_cat" value="'+esc(e.cat||'')+'" placeholder="例：基因/分子病理、事審、出院摘要"></div>'+
  '<div class="pl-fld"><label>用途（一句）</label><input id="plf_use" value="'+esc(e.use||'')+'"></div>'+
  '<div class="pl-fld"><label>使用方式（每行一步，可留空）</label><textarea id="plf_how">'+esc((e.how||[]).join('\n'))+'</textarea></div>'+
  '<div class="pl-fld"><label>完整 Prompt 內容 *</label><textarea id="plf_body" class="big">'+esc(e.body||'')+'</textarea></div>'+
  '<div class="pl-act"><button class="pl-copy" onclick="plSave()">儲存</button><button class="pl-mini" onclick="plCancelForm()">取消</button></div>';}
window.plOpenForm=function(){window._plEdit=null;formMode=true;plRender();};
window.plEdit=function(id){window._plEdit=custom.filter(function(x){return x.id===id;})[0];formMode=true;plRender();};
window.plCancelForm=function(){formMode=false;window._plEdit=null;plRender();};
window.plSave=function(){var title=document.getElementById('plf_title').value.trim();var body=document.getElementById('plf_body').value.trim();if(!title||!body){plToast('標題與內容為必填');return;}
  var e=window._plEdit;var id=(e&&e.id)||('u'+Date.now());
  var obj={id:id,builtin:false,title:title,cat:document.getElementById('plf_cat').value.trim(),use:document.getElementById('plf_use').value.trim(),how:document.getElementById('plf_how').value.split('\n').map(function(s){return s.trim();}).filter(Boolean),body:body};
  var i=-1;custom.forEach(function(x,k){if(x.id===id)i=k;});if(i>=0)custom[i]=obj;else custom.push(obj);
  saveC(custom);formMode=false;window._plEdit=null;plRender();plToast('已儲存到本機');};
window.plDel=function(id){if(!confirm('確定刪除這則 Prompt？'))return;custom=custom.filter(function(x){return x.id!==id;});saveC(custom);plRender();plToast('已刪除');};
document.getElementById('plMask').addEventListener('click',function(e){if(e.target.id==='plMask')plClose();});
document.getElementById('plQ').addEventListener('input',function(){if(!formMode)plRender();});
document.addEventListener('keydown',function(e){if(e.key==='Escape'&&document.getElementById('plMask').classList.contains('on'))plClose();});
})();
</script>
