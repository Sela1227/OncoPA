<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
<meta name="theme-color" content="#2c4f66">
<title>OncoPA｜彰濱秀傳癌症中心 癌藥事審輔助系統</title>
<!-- App Logo (主視覺，正式 logo) + SELA 雙軌 -->
<link rel="icon" type="image/png" sizes="512x512" href="favicon/app-logo.png">
<link rel="icon" type="image/png" sizes="32x32" href="favicon/favicon-32x32.png">
<link rel="icon" type="image/png" sizes="16x16" href="favicon/favicon-16x16.png">
<link rel="icon" href="favicon/favicon.ico">
<link rel="apple-touch-icon" sizes="180x180" href="favicon/apple-touch-icon.png">
<link rel="manifest" href="favicon/site.webmanifest">
<style>
  :root{
    --accent:#436f8a; --accent-d:#2c4f66; --accent-dd:#22404f; --accent-l:#5b86a3;
    --accent-soft:#dfe9f0; --accent-tint:#eef4f8;
    --canvas:#edf0f3; --surface:#ffffff; --surface-2:#f5f7f9; --surface-3:#eef2f5;
    --ink:#18262f; --ink-2:#465864; --ink-3:#7a8a95; --ink-4:#aab6bf;
    --line:#e3e8ec; --line-2:#edf0f3; --hair:#dde3e8;
    --ok:#37795a; --ok-bg:#e6f0ea; --warn:#a9772a; --warn-bg:#f5eddd; --bad:#a84d39; --bad-bg:#f3e1da;
    --chemo:#4f7a72; --target:#6c5d80; --immuno:#8a6a5c; --hormone:#436f8a;
    --r-sm:8px; --r:11px; --r-lg:16px; --r-xl:20px; --pill:999px;
    --sh-sm:0 1px 2px rgba(20,40,55,.05),0 1px 3px rgba(20,40,55,.04);
    --sh:0 2px 8px rgba(20,40,55,.06),0 6px 18px rgba(20,40,55,.05);
    --sh-md:0 8px 28px rgba(20,40,55,.10);
    --ease:cubic-bezier(.4,0,.2,1);
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
  html{scroll-behavior:smooth;}
  html,body{font-family:-apple-system,BlinkMacSystemFont,"SF Pro TC","PingFang TC","Noto Sans TC","Microsoft JhengHei",system-ui,sans-serif;
    color:var(--ink);line-height:1.5;font-size:14.5px;-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility;}
  body{background:var(--canvas);min-height:100vh;overscroll-behavior-y:none;overflow-x:hidden;}
  /* 防止條文內長英文字串（如 Folinicacid/5-fluorouracil/irinotecan）在窄螢幕橫向撐爆 */
  .clause-text,.sel-clause .txt,.pcode,.checklist li,.notes-info li,.cc-head,.common-ref li,.card-title,.crumb,.brand-name,.sel-drug,.disclaim,.dbrand,.empty{overflow-wrap:break-word;word-break:break-word;}
  @media (prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important;}}
  :focus-visible{outline:2px solid var(--accent);outline-offset:2px;}
  .cancer-tile:focus-visible,.drug:focus-visible,.card:focus-visible,.seg button:focus-visible,.stp:focus-visible,.backbtn:focus-visible,.btn:focus-visible,.checklist li:focus-visible{outline:2px solid var(--accent);outline-offset:2px;border-radius:var(--r-sm);}

  /* gate */
  #gate{position:fixed;inset:0;z-index:999;background:radial-gradient(120% 120% at 30% 0%,#5b86a3 0%,#2c4f66 60%,#22404f 100%);display:flex;align-items:center;justify-content:center;padding:24px;}
  .gate-card{background:var(--surface);border-radius:var(--r-xl);padding:34px 30px;width:min(380px,92vw);box-shadow:var(--sh-md);text-align:center;}
  .gate-card h1{font-size:21px;font-weight:700;color:var(--accent-dd);margin-bottom:3px;letter-spacing:.2px;}
  .gate-card .sub{font-size:13px;color:var(--ink-2);margin-bottom:2px;}
  .gate-card .org{font-size:12px;color:var(--ink-3);margin-bottom:20px;}
  .gate-card input{width:100%;padding:13px 15px;border:1px solid var(--line);border-radius:var(--r);font-size:15px;text-align:center;letter-spacing:3px;background:var(--surface-2);transition:.16s var(--ease);}
  .gate-card input:focus{outline:none;border-color:var(--accent);background:#fff;box-shadow:0 0 0 4px var(--accent-tint);}
  .gate-card button{margin-top:14px;width:100%;padding:13px;border:none;border-radius:var(--r);background:var(--accent);color:#fff;font-size:15px;font-weight:600;cursor:pointer;transition:.16s var(--ease);}
  .gate-card button:hover{background:var(--accent-d);}
  .gate-card button:active{transform:scale(.985);}
  .gate-err{color:var(--bad);font-size:12px;margin-top:9px;min-height:15px;}

  /* topbar */
  .topbar{background:var(--accent-dd);position:sticky;top:0;z-index:200;box-shadow:0 1px 0 rgba(255,255,255,.06),0 2px 12px rgba(0,0,0,.12);}
  .topbar-inner{max-width:1180px;margin:0 auto;display:flex;align-items:center;gap:12px;padding:10px 22px;}
  .logo-wrap{width:34px;height:34px;border-radius:9px;overflow:hidden;flex-shrink:0;box-shadow:0 1px 4px rgba(0,0,0,.3);}
  .logo-wrap img{width:34px;height:34px;display:block;}
  .brand{flex:1;min-width:0;display:flex;flex-direction:column;gap:1px;}
  .brand-name{font-size:14.5px;font-weight:600;color:#fff;line-height:1.2;display:flex;align-items:center;flex-wrap:wrap;}
  .brand-name .zh{font-weight:400;color:rgba(255,255,255,.6);margin-left:9px;font-size:13px;}
  .ver-badge{margin-left:8px;padding:1px 8px;border-radius:var(--pill);background:rgba(255,255,255,.16);color:#fff;font-size:11px;font-weight:700;font-family:ui-monospace,"SF Mono",Menlo,monospace;letter-spacing:.2px;}
  .brand-version{font-size:11px;color:rgba(255,255,255,.5);font-family:ui-monospace,"SF Mono",Menlo,monospace;}

  .wrap{max-width:1180px;margin:0 auto;padding:20px 22px 64px;}

  /* stepper */
  .stepper{display:flex;gap:4px;margin-bottom:22px;background:var(--surface);border:1px solid var(--line);border-radius:var(--pill);padding:4px;box-shadow:var(--sh-sm);max-width:560px;}
  .stp{flex:1;display:flex;align-items:center;justify-content:center;gap:7px;padding:8px 6px;font-size:12.5px;font-weight:600;color:var(--ink-3);border-radius:var(--pill);transition:.16s var(--ease);white-space:nowrap;}
  .stp .n{width:19px;height:19px;border-radius:50%;background:var(--surface-3);color:var(--ink-3);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0;transition:.16s var(--ease);}
  .stp.active{background:var(--accent);color:#fff;}
  .stp.active .n{background:rgba(255,255,255,.25);color:#fff;}
  .stp.done{color:var(--accent);cursor:pointer;}
  .stp.done .n{background:var(--accent-soft);color:var(--accent-d);}
  .stp.done:hover{background:var(--accent-tint);}

  /* screens */
  .screen{display:none;}
  .screen.show{display:block;animation:rise .26s var(--ease);}
  #scr-find.show{display:flex;flex-direction:column;justify-content:center;min-height:calc(100vh - 330px);}
  @keyframes rise{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:none;}}

  /* navbar within screen */
  .navbar{display:flex;align-items:center;gap:10px;margin-bottom:16px;}
  .backbtn{display:inline-flex;align-items:center;gap:5px;background:var(--surface);border:1px solid var(--line);border-radius:var(--r-sm);padding:8px 13px;font-size:13px;color:var(--ink-2);cursor:pointer;font-weight:600;flex-shrink:0;transition:.16s var(--ease);box-shadow:var(--sh-sm);}
  .backbtn:hover{background:var(--surface-2);color:var(--accent-d);}
  .backbtn:active{transform:scale(.97);}
  .crumb{flex:1;min-width:0;font-size:13px;color:var(--ink-2);display:flex;gap:8px;align-items:center;flex-wrap:wrap;}
  .crumb b{color:var(--accent-d);font-weight:700;}
  .crumb .sep{color:var(--ink-4);}
  .crumb .pill{font-size:11px;font-weight:700;padding:2px 9px;border-radius:var(--pill);}
  .pill-pr{background:var(--warn-bg);color:var(--warn);}
  .pill-no{background:var(--ok-bg);color:var(--ok);}

  /* hero (find) */
  .hero{text-align:center;padding:14px 0 26px;}
  .hero h2{font-size:26px;font-weight:700;letter-spacing:-.4px;color:var(--ink);margin-bottom:8px;}
  .hero p{font-size:14px;color:var(--ink-3);margin-bottom:24px;}
  .searchwrap{position:relative;max-width:560px;margin:0 auto 8px;}
  .searchwrap svg{position:absolute;left:16px;top:50%;transform:translateY(-50%);width:18px;height:18px;color:var(--ink-4);pointer-events:none;}
  input.search{width:100%;padding:13px 16px 13px 44px;border:1px solid var(--line);border-radius:var(--r);font-size:15px;background:var(--surface);box-shadow:var(--sh-sm);transition:.16s var(--ease);}
  input.search:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 4px var(--accent-tint);}
  .divide{display:flex;align-items:center;gap:12px;max-width:560px;margin:22px auto 16px;color:var(--ink-4);font-size:12px;}
  .divide::before,.divide::after{content:"";flex:1;height:1px;background:var(--line);}
  .section-label{font-size:12px;font-weight:700;color:var(--ink-3);letter-spacing:.6px;margin:0 auto 12px;max-width:760px;}
  .cancer-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(132px,1fr));gap:9px;max-width:760px;margin:0 auto;}
  .cancer-tile{display:flex;align-items:center;justify-content:center;padding:14px 10px;background:var(--surface);border:1px solid var(--line);border-radius:var(--r);font-size:14px;font-weight:600;color:var(--ink-2);cursor:pointer;box-shadow:var(--sh-sm);transition:.16s var(--ease);}
  .cancer-tile:hover{border-color:var(--accent-l);color:var(--accent-d);transform:translateY(-1px);box-shadow:var(--sh);}
  .cancer-tile:active{transform:translateY(0);}

  /* results / drug grid */
  .results{margin-top:14px;display:grid;gap:9px;max-width:680px;margin-left:auto;margin-right:auto;}
  .toolbar{display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin-bottom:14px;}
  .toolbar .searchwrap{flex:1;min-width:200px;margin:0;max-width:none;}
  .seg{display:inline-flex;background:var(--surface-3);border-radius:var(--r);padding:3px;gap:2px;}
  .seg button{border:none;background:transparent;padding:7px 14px;font-size:12.5px;font-weight:600;color:var(--ink-2);border-radius:8px;cursor:pointer;transition:.16s var(--ease);white-space:nowrap;}
  .seg button:hover{color:var(--accent-d);}
  .seg button.on{background:var(--surface);color:var(--accent-d);box-shadow:var(--sh-sm);}
  .count{font-size:12.5px;color:var(--ink-3);margin-bottom:12px;}
  .drug-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(248px,1fr));gap:10px;}
  .drug{background:var(--surface);border:1px solid var(--line);border-radius:var(--r);padding:13px 14px;cursor:pointer;display:flex;align-items:center;gap:11px;box-shadow:var(--sh-sm);transition:.16s var(--ease);}
  .drug:hover{border-color:var(--accent-l);transform:translateY(-1px);box-shadow:var(--sh);}
  .drug:active{transform:translateY(0);}
  .drug .dn{flex:1;min-width:0;}
  .drug .dname{font-weight:600;font-size:14.5px;color:var(--ink);letter-spacing:-.1px;}
  .drug .dnum{font-size:11px;color:var(--ink-4);font-family:ui-monospace,Menlo,monospace;margin-left:5px;}
  .drug .dbrand{font-size:12px;color:var(--ink-3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:1px;}
  .doc-code{display:inline-block;font-size:11px;color:var(--accent-d);background:var(--accent-tint);border:1px solid var(--accent-soft);border-radius:5px;padding:0 6px;margin-left:6px;font-weight:600;vertical-align:middle;white-space:nowrap;}
  .tag{font-size:10px;padding:2px 8px;border-radius:var(--pill);font-weight:700;white-space:nowrap;flex-shrink:0;}
  .tag.化療{background:rgba(79,122,114,.12);color:var(--chemo);}.tag.標靶{background:rgba(108,93,128,.12);color:var(--target);}
  .tag.免疫{background:rgba(138,106,92,.13);color:var(--immuno);}.tag.荷爾蒙{background:rgba(67,111,138,.12);color:var(--hormone);}
  .badge-pr{font-size:10px;font-weight:700;color:var(--warn);background:var(--warn-bg);padding:2px 8px;border-radius:var(--pill);white-space:nowrap;flex-shrink:0;}
  .empty{color:var(--ink-3);font-size:13px;padding:28px 14px;text-align:center;background:var(--surface);border:1px dashed var(--line);border-radius:var(--r);}
  .results .empty,.drug-grid .empty{grid-column:1/-1;}

  /* console split (desktop master-detail) */
  .console{display:grid;grid-template-columns:1fr 1fr;gap:18px;align-items:start;}
  .list-pane{min-width:0;}
  .prep-pane{position:sticky;top:74px;}
  .panel{background:var(--surface);border:1px solid var(--line);border-radius:var(--r-lg);box-shadow:var(--sh-sm);}
  .pane-head{padding:14px 16px 0;}
  .pane-head h3{font-size:13px;font-weight:700;color:var(--ink-3);letter-spacing:.5px;}
  .list-body{padding:14px 16px 16px;}
  .pane-mobile-back{display:none;}

  .sel-drug{display:flex;align-items:center;gap:9px;flex-wrap:wrap;padding:12px 14px;background:var(--accent-tint);border:1px solid var(--accent-soft);border-radius:var(--r);margin-bottom:14px;}
  .sel-drug .nm{font-weight:700;color:var(--accent-dd);font-size:15px;}
  .sel-drug .meta{font-size:12px;color:var(--ink-2);}

  .subgroup{display:flex;align-items:center;gap:8px;margin:18px 0 9px;font-size:12px;font-weight:700;color:var(--accent-d);letter-spacing:.4px;}
  .subgroup::after{content:"";flex:1;height:1px;background:var(--line);}
  .subgroup:first-child{margin-top:2px;}
  .use-head{display:flex;align-items:center;gap:6px;margin:11px 0 7px 1px;font-size:11.5px;font-weight:700;color:var(--ink-3);letter-spacing:.5px;}
  .use-head::before{content:"";width:3px;height:11px;border-radius:2px;background:var(--accent);}
  .card{border:1px solid var(--line);border-radius:var(--r);padding:13px 14px;margin-bottom:9px;cursor:pointer;transition:.16s var(--ease);background:var(--surface);}
  .card:hover{border-color:var(--accent-l);box-shadow:var(--sh);}
  .card.picked{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-tint);}
  .card-top{display:flex;gap:9px;align-items:center;margin-bottom:7px;}
  .card-no{width:22px;height:22px;border-radius:7px;background:var(--accent-soft);color:var(--accent-dd);font-weight:700;font-size:12px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
  .card-title{flex:1;font-size:14px;font-weight:700;color:var(--ink);line-height:1.45;letter-spacing:-.1px;}
  .utag{font-size:10px;font-weight:700;padding:2px 9px;border-radius:var(--pill);white-space:nowrap;flex-shrink:0;}
  .utag.single{background:var(--accent-soft);color:var(--accent-dd);}
  .utag.combo{background:#ece1da;color:var(--immuno);}
  .clause-text{font-size:13px;color:var(--ink-2);line-height:1.72;white-space:pre-wrap;}
  .clause-no{display:inline-block;min-width:18px;color:var(--accent-d);font-weight:700;}
  .card-cta{display:flex;justify-content:flex-end;align-items:center;gap:4px;margin-top:9px;color:var(--accent);font-size:12.5px;font-weight:700;cursor:pointer;}
  .chev{flex-shrink:0;width:15px;height:15px;color:var(--ink-3);transition:transform .18s var(--ease);}
  .card.open .chev{transform:rotate(90deg);color:var(--accent);}
  .card-top{margin-bottom:0;}
  .card.open>.card-top{margin-bottom:9px;}
  .card-body{display:none;}
  .card.open>.card-body{display:block;}

  .common-ref{margin-top:16px;border:1px solid var(--line);border-radius:var(--r);padding:14px;background:var(--surface-2);}
  .common-ref h3{font-size:12.5px;font-weight:700;color:var(--ink-2);margin-bottom:9px;display:flex;gap:7px;align-items:center;}
  .common-ref ul{list-style:none;display:grid;gap:7px;}
  .common-ref li{font-size:12px;color:var(--ink-2);padding-left:15px;position:relative;line-height:1.6;}
  .common-ref li::before{content:"";position:absolute;left:2px;top:8px;width:5px;height:5px;border-radius:50%;background:var(--accent-l);}

  /* prep */
  .prep-empty{padding:40px 22px;text-align:center;color:var(--ink-3);font-size:13px;}
  .prep-empty svg{width:34px;height:34px;color:var(--ink-4);margin-bottom:12px;}
  .prep-body{padding:16px;}
  .prep-h{font-size:12px;font-weight:700;color:var(--ink-3);letter-spacing:.5px;margin-bottom:6px;}
  .sel-clause{font-size:14px;font-weight:700;color:var(--accent-dd);line-height:1.5;margin-bottom:12px;}
  .sel-clause .txt{font-weight:400;color:var(--ink-2);font-size:13px;line-height:1.7;white-space:pre-wrap;margin-top:8px;display:block;}
  .pr-box{border-radius:var(--r);padding:11px 13px;margin-bottom:14px;font-size:13px;display:flex;align-items:center;gap:9px;}
  .pr-box .ic{width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:13px;}
  .pr-box.yes{background:var(--warn-bg);color:#7e5a1e;}.pr-box.yes .ic{background:var(--warn);color:#fff;}
  .pr-box.no{background:var(--ok-bg);color:#2c5742;}.pr-box.no .ic{background:var(--ok);color:#fff;}
  .pr-box b{font-weight:700;}
  .rblk{margin:16px 0;}
  .rblk h4{font-size:12.5px;font-weight:700;color:var(--accent-d);margin-bottom:9px;letter-spacing:.3px;}
  .checklist{list-style:none;display:grid;gap:7px;}
  .checklist li{display:flex;gap:10px;align-items:flex-start;font-size:13px;background:var(--surface-2);border:1px solid var(--line-2);border-radius:var(--r-sm);padding:9px 11px;cursor:pointer;transition:.14s var(--ease);}
  .checklist li:hover{border-color:var(--accent-soft);}
  .checklist li .box{width:18px;height:18px;border:1.5px solid var(--ink-4);border-radius:5px;flex-shrink:0;margin-top:1px;display:flex;align-items:center;justify-content:center;font-size:12px;color:#fff;transition:.14s var(--ease);}
  .checklist li.on .box{background:var(--ok);border-color:var(--ok);}
  .checklist li.on{color:var(--ink-3);background:var(--surface);}
  .pcode{font-size:12px;color:var(--ink-2);background:var(--surface-2);border:1px solid var(--line-2);border-radius:var(--r-sm);padding:11px;line-height:1.85;white-space:pre-wrap;}
  .pcode b{color:var(--accent-d);font-weight:700;}
  .cc-head{font-size:12px;font-weight:600;color:var(--ink-2);line-height:1.55;margin:12px 0 7px;}
  #ccommon .cc-head:first-child{margin-top:0;}
  #ccommon ul.checklist+.cc-head{margin-top:14px;}
  .notes-info{list-style:none;display:grid;gap:6px;}
  .notes-info li{font-size:12px;color:#7e5a1e;padding:9px 11px;background:var(--warn-bg);border-radius:var(--r-sm);line-height:1.6;}
  .disclaim{font-size:11px;color:var(--ink-3);margin-top:14px;line-height:1.65;border-top:1px solid var(--line-2);padding-top:11px;}

  /* buttons */
  .btn{border:none;border-radius:var(--r-sm);padding:10px 16px;font-size:14px;font-weight:600;cursor:pointer;transition:.16s var(--ease);display:inline-flex;align-items:center;justify-content:center;gap:7px;}
  .btn:active{transform:scale(.98);}
  .btn.primary{background:var(--accent);color:#fff;box-shadow:var(--sh-sm);}
  .btn.primary:hover{background:var(--accent-d);}
  .btn.ghost{background:var(--surface);color:var(--ink-2);border:1px solid var(--line);}
  .btn.ghost:hover{background:var(--surface-2);color:var(--accent-d);}
  .btn.block{width:100%;}
  .btn.sm{padding:8px 13px;font-size:13px;}
  .btn-row{display:flex;gap:8px;flex-wrap:wrap;margin-top:14px;}

  /* sela credit */
  .sela-credit{max-width:1180px;margin:30px auto 0;display:flex;flex-direction:column;align-items:center;gap:7px;padding-top:20px;border-top:1px solid var(--line);}
  .sela-credit img{width:30px;height:30px;opacity:.9;}
  .sela-credit span{font-size:12px;color:var(--ink-3);letter-spacing:.4px;}
  .sela-credit b{color:var(--ink-2);}

  @media(max-width:979px){
    .console{display:block;}
    .prep-pane{position:static;margin-top:0;}
    #scr-clauses .prep-pane{display:none;}
    #scr-clauses.detail-open .list-pane{display:none;}
    #scr-clauses.detail-open .prep-pane{display:block;animation:rise .24s var(--ease);}
    .pane-mobile-back{display:inline-flex;}
    .cancer-grid{grid-template-columns:repeat(auto-fill,minmax(104px,1fr));}
    .drug-grid{grid-template-columns:1fr;}
    .hero h2{font-size:22px;}
    .wrap{padding:16px 16px 60px;}
    .stepper{max-width:none;}
    .stp span.lbl{display:none;}
    .stp.active span.lbl{display:inline;}
  }

    .checklist{gap:1px;}

  }


/* ── 病摘 AI Prompt 庫（整合）── */
.pl-launch{margin-left:auto;background:rgba(255,255,255,.16);border:1px solid rgba(255,255,255,.28);color:#fff;border-radius:var(--pill);padding:6px 13px;font-size:13px;font-weight:600;cursor:pointer;white-space:nowrap}
.pl-launch:hover{background:rgba(255,255,255,.26)}
.pl-prep-hint{margin-top:10px;background:var(--accent-tint);border:1px solid var(--accent-soft);border-radius:var(--r);padding:11px 14px;font-size:13.5px;color:var(--accent-d);cursor:pointer;line-height:1.5}
.pl-prep-hint:hover{background:var(--accent-soft)}
.pl-mask{position:fixed;inset:0;background:rgba(20,40,55,.5);display:none;align-items:flex-start;justify-content:center;z-index:1000;padding:24px 16px;overflow:auto}
.pl-mask.on{display:flex}
.pl-modal{background:var(--surface);border-radius:var(--r-lg);box-shadow:var(--sh-md);width:100%;max-width:760px;margin:auto;display:flex;flex-direction:column;max-height:92vh}
.pl-head{padding:17px 20px;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:10px}
.pl-head h2{margin:0;font-size:18px;flex:1}
.pl-x{background:none;border:none;font-size:23px;color:var(--ink-3);cursor:pointer;line-height:1;padding:0 4px}
.pl-tools{padding:12px 20px 9px;border-bottom:1px solid var(--line-2)}
.pl-row{display:flex;gap:9px;flex-wrap:wrap;align-items:center}
.pl-search{flex:1;min-width:170px;border:1px solid var(--line);border-radius:var(--r);padding:9px 13px;font-size:14px;outline:none;color:var(--ink)}
.pl-search:focus{border-color:var(--accent-l);box-shadow:0 0 0 3px var(--accent-soft)}
.pl-add{background:var(--accent);color:#fff;border:none;border-radius:var(--r);padding:9px 14px;font-size:13.5px;font-weight:600;cursor:pointer;white-space:nowrap}
.pl-add:hover{background:var(--accent-d)}
.pl-cats{display:flex;gap:6px;flex-wrap:wrap;margin-top:9px}
.pl-chip{border:1px solid var(--line);background:var(--surface);border-radius:var(--pill);padding:4px 12px;font-size:12px;color:var(--ink-2);cursor:pointer}
.pl-chip.on{background:var(--accent);color:#fff;border-color:var(--accent)}
.pl-body{padding:14px 20px 20px;overflow:auto}
.pl-card{border:1px solid var(--line);border-radius:var(--r);box-shadow:var(--sh-sm);margin-bottom:12px;overflow:hidden}
.pl-ttl{font-size:15px;font-weight:700;margin:13px 15px 3px;display:flex;gap:7px;flex-wrap:wrap;align-items:center}
.pl-tag{font-size:11px;border-radius:var(--pill);padding:2px 9px;background:var(--accent-tint);color:var(--accent-d);font-weight:500}
.pl-tag.mine{background:var(--ok-bg);color:var(--ok)}
.pl-use{font-size:13px;color:var(--ink-2);margin:0 15px}
.pl-how{font-size:12.5px;color:var(--ink-3);margin:7px 15px 0;padding-left:18px}
.pl-how li{margin:2px 0}
.pl-act{display:flex;gap:7px;flex-wrap:wrap;padding:12px 15px 13px}
.pl-copy{background:var(--accent);color:#fff;border:none;border-radius:var(--r-sm);padding:8px 15px;font-size:13.5px;font-weight:600;cursor:pointer}
.pl-copy.done{background:var(--ok)}
.pl-mini{background:var(--surface-2);border:1px solid var(--line);border-radius:var(--r-sm);padding:8px 12px;font-size:12.5px;color:var(--ink-2);cursor:pointer}
.pl-mini:hover{background:var(--surface-3)}
.pl-full{display:none;margin:0;padding:14px 15px;background:var(--surface-2);border-top:1px solid var(--line);font-family:ui-monospace,Menlo,monospace;font-size:12px;line-height:1.55;white-space:pre-wrap;word-break:break-word;color:var(--ink-2);max-height:360px;overflow:auto}
.pl-full.open{display:block}
.pl-fld{margin-bottom:11px}
.pl-fld label{display:block;font-size:12.5px;color:var(--ink-2);margin-bottom:4px;font-weight:600}
.pl-fld input,.pl-fld textarea{width:100%;border:1px solid var(--line);border-radius:var(--r-sm);padding:8px 11px;font-size:13.5px;font-family:inherit;color:var(--ink);outline:none;box-sizing:border-box}
.pl-fld textarea{resize:vertical;min-height:78px}
.pl-fld textarea.big{min-height:170px;font-family:ui-monospace,Menlo,monospace;font-size:12px}
.pl-empty{text-align:center;color:var(--ink-3);padding:36px}
.pl-toast{position:fixed;bottom:26px;left:50%;transform:translateX(-50%);background:var(--ink);color:#fff;padding:9px 17px;border-radius:var(--pill);font-size:13.5px;opacity:0;transition:.25s;z-index:1100;pointer-events:none}
.pl-toast.on{opacity:1}

/* ── 列印頁首（螢幕隱藏，僅列印顯示）＋ 列印前病人資訊彈窗 ── */
#printHead{display:none;}
.pr-mask{position:fixed;inset:0;background:rgba(20,40,55,.5);display:none;align-items:center;justify-content:center;z-index:1000;padding:24px 16px}
.pr-mask.on{display:flex}
.pr-dlg{background:var(--surface);border-radius:var(--r-lg);box-shadow:var(--sh-md);width:100%;max-width:400px;padding:20px 22px}

.pr-note{font-size:12.5px;color:var(--ink-2);line-height:1.55;margin:0 0 14px}
.pr-fld{display:block;font-size:13px;color:var(--ink-2);font-weight:600;margin-bottom:11px}
.pr-fld input{display:block;width:100%;box-sizing:border-box;margin-top:4px;border:1px solid var(--line);border-radius:var(--r-sm);padding:9px 11px;font-size:14px;font-family:inherit;color:var(--ink);outline:none}
.pr-fld input:focus{border-color:var(--accent-l);box-shadow:0 0 0 3px var(--accent-soft)}
.pr-dlg-btns{display:flex;gap:8px;justify-content:flex-end;margin-top:16px}

/* ── 操作精靈步驟樣式（僅啟用後使用；未啟用時無畫面影響）── */
.wz-empty{padding:34px 20px;text-align:center;color:#8aa0ad;font-size:14px}
.wz-draft{background:#fef3c7;border:1px solid #fcd34d;color:#92600a;border-radius:var(--r);padding:10px 13px;margin-bottom:12px;font-size:13px;line-height:1.5;font-weight:600}
.wz-notes{background:#fff7ed;border:1px solid #fed7aa;border-radius:var(--r);padding:12px 14px;margin-bottom:14px}
.wz-notes h4{margin:0 0 6px;font-size:14px;color:#9a3412}
.wz-notes ul,.wz-caut{margin:0;padding-left:18px}
.wz-step{border:1px solid var(--line);border-radius:var(--r);padding:12px 14px;margin-bottom:10px}
.wz-step-h{display:flex;align-items:center;gap:8px;font-weight:700;font-size:15px;color:var(--accent-dd)}
.wz-num{display:inline-flex;align-items:center;justify-content:center;width:22px;height:22px;border-radius:50%;background:var(--accent);color:#fff;font-size:13px;flex:none}
.wz-step-b{margin-top:6px;font-size:13.5px;line-height:1.6;color:var(--ink-2)}
.wz-step-img{max-width:100%;border:1px solid var(--line);border-radius:8px;margin-top:8px}
.wz-caut{margin-top:8px;color:#9a3412;font-size:13px;line-height:1.55}
</style>
</head>

 cetuximab、panitumumab 併用。"},{"num":"(2)","text":"Bevacizumab(除 Zirabev 及 Abevmy 以外)與含有5- fluorouracil/leucovorin/oxaliplatin 的化學療法合併使用，作為先前接受過 以 fluoropyrimidine 為基礎的化學療法併用 cetuximab 或 panitumumab 無效且 未曾接受過 bevacizumab 治療，RAS 基因沒有突變的轉移性大腸或直腸癌病人的 第二線治療。 Ⅰ.需檢附依全民健康保險醫療服務給付項目及支付標準伴隨式診斷編號30104B 規定之認證實驗室檢驗之 All-RAS 基因突變分析檢測報告。 Ⅱ.使用總療程以24週為上限。 Ⅲ.須經事前審查核准後使用，每次申請事前審查之療程以12週為限，再次申請 必須提出客觀證據（如：RECIST criteria）證實無惡化，才可繼續使 用。 Ⅳ.使用劑量：限5mg/kg，每兩週一次。"}]},{"num":"2","header":"惡性神經膠質瘤(WHO 第4級)-神經膠母細胞瘤：","subitems":[{"num":"(1)","text":"單獨使用可用於治療曾接受標準放射線治療且含 temozolomide 在內之化學藥物治 療失敗之多型性神經膠母細胞瘤(Glioblastoma multiforme)復發之成人患者。"},{"num":"(2)","text":"須經事前審查核准後使用，每次申請事前審查之療程以12週為限，再次申請必須 提出客觀證據（如：影像學）證實無惡化，才可繼續使用。"}],"_title":"復發 GBM（WHO 4 級）"},{"num":"3","header":"卵巢上皮細胞、輸卵管或原發性腹膜癌：(109/6/1、113/3/1、113/9/1、114/3/1、","subitems":[{"num":"(1)","text":"Bevacizumab（除 Zirabev 以外）與 carboplatin 及 paclitaxel 合併使用，接 著單獨使用 bevacizumab（除 Zirabev 以外）治療，作為第四期卵巢上皮細胞、 輸卵管或原發性腹膜癌病人接受初次手術切除後之第一線治療之維持治療。 Ⅰ.初次申請為手術後一個月後起與化學治療併用5個療程。 Ⅱ.第二次申請時為接續單獨使用 bevacizumab 維持性治療9個療程。 Ⅲ.第三次申請時為接續單獨使用 bevacizumab 維持性治療8個療程。 Ⅳ.每人以總共給付22個療程為上限。若病情惡化或停藥後再復發即不得再次 申請。"},{"num":"(2)","text":"Bevacizumab 與 carboplatin 及 paclitaxel 合併使用，作為曾接受過第一線含鉑 類藥物(Platinum-based)化學治療間隔6-12個月內再復發之治療。接著單獨使用 bevacizumab 治療，作為含鉑藥物具感受性之治療。 Ⅰ.若前曾申請 bevacizumab 使用於卵巢上皮細胞、輸卵管或原發性腹膜癌作 為第一線治療者不可再次使用。 Ⅱ.初次申請為5個療程，後續每次申請為5個療程，總申請療程以15個療程為 上限。"},{"num":"(3)","text":"Bevacizumab(限使用 Alymsys、Abevmy、Vegzelma 或 Mvasi)與 olaparib 併用適 用於晚期高度惡性上皮卵巢癌、輸卵管腫瘤或原發性腹膜癌，且對第一線含鉑化 療合併 bevacizumab 有反應（完全反應或部分反應）之成年病人做為維持治療， 患者需符合 olaparib 給付規定，限用兩年。bevacizumab 以15個月的療程為上 限。"},{"num":"(4)","text":"須經事前審查核准後使用，再次申請必須提出客觀證據（如：影像學）證實無惡 化，才可繼續使用。"},{"num":"(5)","text":"FIGO Stage IV disease 具 germline or somatic BRCA 1/2致病性或疑似致病性 突變者，若已經申請 niraparib 用於第一線化學治療後維持性治療時不得另外申 請 bevacizumab 併用，除因 niraparib 耐受性不良，在維持性治療可再換成 bevacizumab（除 Zirabev 以外）單獨使用，總申請療程以17個療程為上限。"}],"_title":"卵巢／輸卵管／腹膜癌"},{"num":"4","header":"持續性、復發性或轉移性之子宮頸癌：","subitems":[{"num":"(1)","text":"Bevacizumab 與 ms":[{"num":"1","header":"與 FOLFOX（folinicacid/ 5-fluorouracil/oxaliplatin）或 FOLFIRI（folinic acid/ 5-fluorouracil/irinotecan）合併使用於治療 RAS 原生型(wild-type)之轉 移性直腸結腸癌病人之第一線治療。需檢附 All-RAS 基因突變分析檢測報告，且需 符合全民健康保險藥品給付規定之通則十二。(98/8/1、110/6/1、113/6/1、","subitems":[{"num":"(1)","text":"本藥品須經事前審查核准後使用，每次申請之療程以18週為限，再次申請必須提出 客觀證據(如：影像學)證實無惡化，才可繼續使用。"},{"num":"(2)","text":"Panitumumab 與 cetuximab 二者僅能擇一使用。"},{"num":"(3)","text":"本藥品不得與 bevacizumab 併用。"},{"num":"(4)","text":"經手術完全切除(R0切除)且查無轉移病灶者不得申請給付。"}],"_title":"RAS wild-type mCRC · 第一線（＋FOLFOX/FOLFIRI）"},{"num":"2","header":"治療已接受過含 5 fluorouracil 、 irinotecan 及 oxaliplatin 二線以上之細胞 毒性治療失敗、RAS 原生型(wild-type)的轉移性直腸結腸癌的病人。需檢附 All- RAS 基因突變分析檢測報告，且需符合全民健康保險藥品給付規定之通則十二。","subitems":[{"num":"(1)","text":"病人先前未曾接受過抗表皮生長因子受體(anti-EGFR)藥品治療。"},{"num":"(2)","text":"本藥品須經事前審查核准後使用，每次申請之療程以9週為限，再次申請必須提出 客觀證據(如：影像學)證實無惡化，才可繼續使用。"},{"num":"(3)","text":"使用總療程以 18 週為上限。"}],"_title":"RAS wild mCRC · 三線（anti-EGFR naïve）"}],"per_cancer":null,"common_data":null,"st":"panitumumab vectibix 與 folfox（folinicacid/ 5-fluorouracil/oxaliplatin）或 folfiri（folinic acid/ 5-fluorouracil/irinotecan）合併使用於治療 ras 原生型(wild-type)之轉 移性直腸結腸癌病人之第一線治療。需檢附 all-ras 基因突變分析檢測報告，且需 符合全民健康保險藥品給付規定之通則十二。(98/8/1、110/6/1、113/6/1、 本藥品須經事前審查核准後使用，每次申請之療程以18週為限，再次申請必須提出 客觀證據(如：影像學)證實無惡化，才可繼續使用。 panitumumab 與 cetuximab 二者僅能擇一使用。 本藥品不得與 bevacizumab 併用。 經手術完全切除(r0切除)且查無轉移病灶者不得申請給付。 治療已接受過含 5 fluorouracil 、 irinotecan 及 oxaliplatin 二線以上之細胞 毒性治療失敗、ras 原生型(wild-type)的轉移性直腸結腸癌的病人。需檢附 all- ras 基因突變分析檢測報告，且需符合全民健康保險藥品給付規定之通則十二。 病人先前未曾接受過抗表皮生長因子受體(anti-egfr)藥品治療。 本藥品須經事前審查核准後使用，每次申請之療程以9週為限，再次申請必須提出 客觀證據(如：影像學)證實無惡化，才可繼續使用。 使用總療程以 18 週為上限。"},{"num":"9.54","name":"Enzalutamide","brand":"Xtandi","cancers":["泌尿癌"],"types":["荷爾蒙"],"pre_review":true,"form_no":"","items":[{"num":"1","header":"治療高風險非轉移性去勢抗性前列腺癌(high risk nmCRPC)的成年男性。","subitems":[{"num":"(1)","text":"須經事前審查核准後使用。"},{"num":"(2)","text":"初次申請時需檢附病理報告、使用雄性素去除療法紀錄，系列 PSA 和睪固酮數 據，三個月內影像報告證明無遠端轉移。"},{"num":"(3)","text":"ECOG 分數須≦1。"},{"num":"(4)","text":"PSA doubling time≦10個月，PSA 倍增之時間，應依線性回歸模型計算，且其 參數取得需基於下列原則： Ⅰ.至少三個連續 PSA 測量值，且各測量值皆≧0.2 ng/mL（最高的 PSA 值必須 >1.0ng/ml）。 Ⅱ.應包含先前 ADT 治療期間的測量值，且最少一測量值為最近3個月內測得之 PSA 數值。 Ⅲ.第一個和最後一個 PSA 測量值間隔需≧8週，但≦12個月。"},{"num":"(5)","text":"每3個月需再次申請，申請之療程以3個月為限。再次申請時，有 PSA progression 者，需檢附影像學報告，若影像學報告證實轉移，則需停藥;無 PSA progression 者，則每6個月需檢附影像學報告，若影像學報告證實轉移， 則需停藥。 註： PSA progression 定義為:PSA 下降達最低值(nadir)後，出現 PSA 值上升較 nadir≧25%，且 PSA≧2 ng/mL，並於至少3週後，再次抽血確認 PSA 值有上升趨 勢。"}],"_title":"高風險 nmCRPC"},{"num":"2","header":"治療高風險轉移性的去勢敏感性前列腺癌(mCSPC)，且與雄性素去除療法併用，總療 程以36個月為上限。高風險需符合下列三項條件中至少兩項：（111/3/1、113/8/1、","subitems":[{"num":"(1)","text":"葛里森分數(Gleason score)≧8。"},{"num":"(2)","text":"骨骼掃描出現三個(含)以上病灶且至少其中一處以上為非脊柱及非骨盆腔轉移。"},{"num":"(3)","text":"出現內臟轉移。"}],"_title":"mCSPC · 高風險（＋ADT）"},{"num":"3","header":"治療藥物或手術去勢抗性的轉移性前列腺癌(mCRPC)，且在雄性素去除療法失敗後屬 無症狀或輕度症狀(ECOG 分數0或1)，未曾接受化學治療者：","subitems":[{"num":"(1)","text":"若病患先前接受雄性素去除療法時，在小於12個月的時間內演化成去勢抗性前列 腺癌(CRPC)，且葛里森分數(Gleason score)≧8時，不得於使用化學治療前使 用 enzalutamide。"},{"num":"(2)","text":"申請時需另檢附： I.用藥紀錄(證明未常規使用止痛藥物，屬無症狀或輕度症狀)。 II.三個月內影像報告證明無臟器轉移。"}],"_title":"mCRPC · 無症狀/輕症（化療前）"},{"num":"4","header":"治療藥物或手術去勢抗性的轉移性前列腺癌(ECOG 分數須≦2)且已使用過 docetaxel 2個療程以上治療無效者。","subitems":[],"_title":"mCRPC · docetaxel 後"},{"num":"5","header":"前述2、3、4項須經事前審查核准後使用，每3個月需再次申請。（111/3/1、","subitems":[{"num":"(1)","text":"申請時需檢附病理報告、使用雄性素去除療法紀錄及系列 PSA 和睪固酮數據。"},{"num":"(2)","text":"再申請時若 PSA 值下降未超過治療前的50%以上，則需停藥。(106/9/1、"},{"num":"(3)","text":"下降達最低值後之持續追蹤出現 PSA 較最低值上升50%以上且 PSA≧2ng/ml，則 需停藥，但影像學證據尚無疾病進展者，可以繼續使用。"}]},{"num":"6","header":"去勢抗性前列腺癌(CRPC)病患若於化學治療前先使用過 enzalutamide，當化學治療 失敗後不得再申請使用 enzalutamide。","subitems":[]},{"num":"7","header":"不論病人處於轉移或非轉移的狀態下，新型荷爾蒙藥品(abiraterone、 apalutamide、darolutamide 和 enzalutamide) 及 olaparib 與 abiraterone 併 用，終生僅給付一種治療，且除非出現嚴重不耐受反應導致必須永久停止治療，不 得互換。","subitems":[]},{"num":"8","header":"本品與 radium-223 dichloride 不得合併使用。","subitems":[]}],"per_cancer":null,"common_data":null,"st":"enzalutamide xtandi 治療高風險非轉移性去勢抗性前列腺癌(high risk nmcrpc)的成年男性。 須經事前審查核准後使用。 初次申請時需檢附病理報告、使用雄性素去除療法紀錄，系列 psa 和睪固酮數 據，三個月內影像報告證明無遠端轉移。 ecog 分數須≦1。 psa doubling time≦10個月，psa 倍增之時間，應依線性回歸模型計算，且其 參數取得需基於下列原則： ⅰ.至少三個連續 psa 測量值，且各測量值皆≧0.2 ng/ml（最高的 psa 值必須 >1.0ng/ml）。 ⅱ.應包含先前 adt 治療期間的測量值，且最少一測量值為最近3個月內測得之 psa 數值。 ⅲ.第一個和最後一個 psa 測量值間隔需≧8週，但≦12個月。 每3個月需再次申請，申請之療程以3個月為限。再次申請時，有 psa progression 者，需檢附影像學報告，若影像學報告證實轉移，則需停藥;無 psa progression 者，則每6個月需檢附影像學報告，若影像學報告證實轉移， 則需停藥。 註： psa progression 定義為:psa 下降達最低值(nadir)後，出現 psa 值上升較 nadir≧25%，且 psa≧2 ng/ml，並於至少3週後，再次抽血確認 psa 值有上升趨 勢。 治療高風險轉移性的去勢敏感性前列腺癌(mcspc)，且與雄性素去除療法併用，總療 程以36個月為上限。高風險需符合下列三項條件中至少兩項：（111/3/1、113/8/1、 葛里森分數(gleason score)≧8。 骨骼掃描出現三個(含)以上病灶且至少其中一處以上為非脊柱及非骨盆腔轉移。 出現內臟轉移。 治療藥物或手術去勢抗性的轉移性前列腺癌(mcrpc)，且在雄性素去除療法失敗後屬 無症狀或輕度症狀(ecog 分數0或1)，未曾接受化學治療者： 若病患先前接受雄性素去除療法時，在小於12個月的時間內演化成去勢抗性前列 腺癌(crpc)，且葛里森分數(gleason score)≧8時，不得於使用化學治療前使 用 enzalutamide。 申請時需另檢附： i.用藥紀錄(證明未常規使用止痛藥物，屬無症狀或輕度症狀)。 ii.三個月內影像報告證明無臟器轉移。 治療藥物或手術去勢抗性的轉移性前列腺癌(ecog 分數須≦2)且已使用過 docetaxel 2個療程以上治療無效者。 前述2、3、4項須經事前審查核准後使用，每3個月需再次申請。（111/3/1、 申請時需檢附病理報告、使用雄性素去除療法紀錄及系列 psa 和睪固酮數據。 再申請時若 psa 值下降未超過治療前的50%以上，則需停藥。(106/9/1、 下降達最低值後之持續追蹤出現 psa 較最低值上升50%以上且 psa≧2ng/ml，則 需停藥，但影像學證據尚無疾病進展者，可以繼續使用。 去勢抗性前列腺癌(crpc)病患若於化學治療前先使用過 enzalutamide，當化學治療 失敗後不得再申請使用 enzalutamide。 不論病人處於轉移或非轉移的狀態下，新型荷爾蒙藥品(abiraterone、 apalutamide、darolutamide 和 enzalutamide) 及 olaparib 與 abiraterone 併 用，終生僅給付一種治療，且除非出現嚴重不耐受反應導致必須永久停止治療，不 得互換。 本品與 radium-223 dichloride 不得合併使用。"},{"num":"9.55","name":"Ruxolitinib","brand":"Jakavi","cancers":["血液淋巴癌"],"types":["標靶"],"pre_review":true,"form_no":"","items":[{"num":"1","header":"用於治療International Working Group(IWG) Consensus Criteria中度風險-2或高 風險之骨髓纖維化，包括原發性骨髓纖維化、真性紅血球增多症後骨髓纖維化、或血 小板增多症後骨髓纖維化等疾病所造成脾臟腫大(symptomatic splenomegaly)及/或其 他相關全身症狀且不適於接受幹細胞移植的病人(stem cell transplantation)。","subitems":[{"num":"(1)","text":"需經事前審查核准後使用，每次申請之療程以6個月為限，送審時需檢送影像資料 及症狀改善之病歷紀錄，每6個月評估一次。"},{"num":"(2)","text":"用藥後第一次評估時，需達到症狀反應(symptom response)或脾臟體積無惡化兩者 之一，且同時無AML tranformation，方得以繼續使用。分別定義如下： Ⅰ.症狀反應：MPN-SAF-TSS分數或MPN-10與治療前基準值相比，需下降超過50%。 Ⅱ.脾臟體積無惡化：使用電腦斷層評估，脾臟長度未增加超過治療前基準值之40% 以上(或體積增加未達25%以上)。 Ⅲ.AML transformation：骨髓中之芽細胞≥20%或血液中之芽細胞≥20%合併芽細胞 數值≥1×109/L。"},{"num":"(3)","text":"用藥後第二次及其後的評估，必須顯示無疾病惡化（無症狀惡化且脾臟體積無惡 化，並同時無AML transformation），方得以繼續使用。分別定義如下： Ⅰ.無症狀惡化：未出現新症狀，且MPN-SAF-TSS分數或MPN-10未超過治療前的基準 值。 Ⅱ.脾臟體積無惡化：使用電腦斷層評估，脾臟長度未增加超過最佳反應(best response)時之脾臟長度40%以上(或體積增加未達25%以上)。 Ⅲ.AML transformation：骨髓中之芽細胞≥20%或血液中之芽細胞≥20%合併芽細胞 數值≥1×10 /L。"},{"num":"(4)","text":"Jakavi 5mg每日限最多使用4粒，Jakavi 15mg或20mg每日限最多使用2粒，且其5mg 不得與15mg或20mg併用。"},{"num":"(5)","text":"本藥品與fedratinib、momelotinib用於中度風險或高風險之骨髓纖維化治療時， 僅得擇一給付。fedratinib、momelotinib治療後如疾病惡化不得換用本藥品。"}],"_title":"骨髓纖維化 · 中-2/高風險"},{"num":"2","header":"移植物抗宿主疾病，限用Jakavi 5mg，每日最多使用4 粒。","subitems":[{"num":"(1)","text":"用於治療12歲以上之青少年及成人，且先前曾接受皮質類固醇(corticosteroids) 後反應不佳的第2級(含)以上急性移植物抗宿主疾病(acute graft-versus-host disease,GvHD)病人。 Ⅰ.首次治療，可免事前審查，以28天為限，但須於病歷記載診斷、嚴重度評估以 及先前藥物治療反應評估。若使用後疾病持續進展，即不得再使用。 Ⅱ.續用時需經事前審查核准後使用，限續申請一次並以2個月為限，申請時須檢附 先前治療處方紀錄及療效評估。用藥後，若有疾病持續進展，則應停藥。 Ⅲ.使用總療程以3個月為上限。 Ⅳ.若後續轉變為慢性移植物抗宿主疾病（chronic GvHD）時，需依慢性移植物抗 宿主疾病之給付規定申請。 Ⅴ.先前曾接受皮質類固醇（corticosteroids）後反應不佳需符合以下任一條件： ⅰ.≧1mg/kg/day methylprednisolone (or equivalent prednisone dose) 3 天後，疾病仍持續進展。 ⅱ.≧1mg/kg/day methylprednisolone (or equivalent prednisone dose) 開 始的5天後未見改善。 ⅲ.發生皮質類固醇依賴性：在逐漸調降皮質類固醇期間，無法將 methylprednisolone (or equivalent prednisone dose)劑量調降 <0.5mg/kg/day 維持至少7天。 ⅳ.發生皮質類固醇不耐受性：初始治療後，發生 CTCAE G3之嚴重不良反應情 形。"},{"num":"(2)","text":"用於治療12歲以上之青少年及成人，且先前曾接受皮質類固醇(corticosteroids) 後反應不佳的慢性移植物抗宿主疾病(chronic graft-versus-host disease,GvHD) 病人。 Ⅰ.限用於發生肺部之慢性移植物抗宿主疾病，須同時符合下列條件: ⅰ.肺功能檢查之 FEV1<80%。 ⅱ.檢附 CT 報告帶有 air trapping, small airway thickening 或 bronchiectasis 等肺部侵犯的表徵。 Ⅱ.需經事前審查核准後使用。 Ⅲ.第一次療程為3個月，續用申請之療程以3個月為限，送審時需檢送療效評 估，每3個月評估一次。用藥後，若有疾病持續進展，則不予同意使用。 Ⅳ.使用總療程以24個月為上限。 Ⅴ.先前曾接受皮質類固醇（corticosteroids）後反應不佳需符合以下任一條 件： ⅰ.每日施用 ≥ 0.5 mg/kg/day prednisone 治療至少7天後，疾病仍持續進 展。 ⅱ.每日平均施用 ≥ 0.5 mg/kg/day prednisone (或隔日≥1 mg/kg) ，治療 至少1個月後，疾病仍未改善。 ⅲ.發生皮質類固醇依賴性：在逐漸調降皮質類固醇期間，無法將劑量調降至 每日0.25 mg/kg 以下維持至少7 天。 ⅳ.發生皮質類固醇不耐受性:初始治療後，發生 CTCAE G3 嚴重不良反應之 情形。"}],"_title":"移植物抗宿主病（GvHD）"}],"per_cancer":null,"common_data":null,"st":"ruxolitinib jakavi 用於治療international working group(iwg) consensus criteria中度風險-2或高 風險之骨髓纖維化，包括原發性骨髓纖維化、真性紅血球增多症後骨髓纖維化、或血 小板增多症後骨髓纖維化等疾病所造成脾臟腫大(symptomatic splenomegaly)及/或其 他相關全身症狀且不適於接受幹細胞移植的病人(stem cell transplantation)。 需經事前審查核准後使用，每次申請之療程以6個月為限，送審時需檢送影像資料 及症狀改善之病歷紀錄，每6個月評估一次。 用藥後第一次評估時，需達到症狀反應(symptom response)或脾臟體積無惡化兩者 之一，且同時無aml tranformation，方得以繼續使用。分別定義如下： ⅰ.症狀反應：mpn-saf-tss分數或mpn-10與治療前基準值相比，需下降超過50%。 ⅱ.脾臟體積無惡化：使用電腦斷層評估，脾臟長度未增加超過治療前基準值之40% 以上(或體積增加未達25%以上)。 ⅲ.aml transformation：骨髓中之芽細胞≥20%或血液中之芽細胞≥20%合併芽細胞 數值≥1×109/l。 用藥後第二次及其後的評估，必須顯示無疾病惡化（無症狀惡化且脾臟體積無惡 化，並同時無aml transformation），方得以繼續使用。分別定義如下： ⅰ.無症狀惡化：未出現新症狀，且mpn-saf-tss分數或mpn-10未超過治療前的基準 值。 ⅱ.脾臟體積無惡化：使用電腦斷層評估，脾臟長度未增加超過最佳反應(best response)時之脾臟長度40%以上(或體積增加未達25%以上)。 ⅲ.aml transformation：骨髓中之芽細胞≥20%或血液中之芽細胞≥20%合併芽細胞 數值≥1×10 /l。 jakavi 5mg每日限最多使用4粒，jakavi 15mg或20mg每日限最多使用2粒，且其5mg 不得與15mg或20mg併用。 本藥品與fedratinib、momelotinib用於中度風險或高風險之骨髓纖維化治療時， 僅得擇一給付。fedratinib、momelotinib治療後如疾病惡化不得換用本藥品。 移植物抗宿主疾病，限用jakavi 5mg，每日最多使用4 粒。 用於治療12歲以上之青少年及成人，且先前曾接受皮質類固醇(corticosteroids) 後反應不佳的第2級(含)以上急性移植物抗宿主疾病(acute graft-versus-host disease,gvhd)病人。 ⅰ.首次治療，可免事前審查，以28天為限，但須於病歷記載診斷、嚴重度評估以 及先前藥物治療反應評估。若使用後疾病持續進展，即不得再使用。 ⅱ.續用時需經事前審查核准後使用，限續申請一次並以2個月為限，申請時須檢附 先前治療處方紀錄及療效評估。用藥後，若有疾病持續進展，則應停藥。 ⅲ.使用總療程以3個月為上限。 ⅳ.若後續轉變為慢性移植物抗宿主疾病（chronic gvhd）時，需依慢性移植物抗 宿主疾病之給付規定申請。 ⅴ.先前曾接受皮質類固醇（corticosteroids）後反應不佳需符合以下任一條件： ⅰ.≧1mg/kg/day methylprednisolone (or equivalent prednisone dose) 3 天後，疾病仍持續進展。 ⅱ.≧1mg/kg/day methylprednisolone (or equivalent prednisone dose) 開 始的5天後未見改善。 ⅲ.發生皮質類固醇依賴性：在逐漸調降皮質類固醇期間，無法將 methylprednisolone (or equivalent prednisone dose)劑量調降 <0.5mg/kg/day 維持至少7天。 ⅳ.發生皮質類固醇不耐受性：初始治療後，發生 ctcae g3之嚴重不良反應情 形。 用於治療12歲以上之青少年及成人，且先前曾接受皮質類固醇(corticosteroids) 後反應不佳的慢性移植物抗宿主疾病(chronic graft-versus-host disease,gvhd) 病人。 ⅰ.限用於發生肺部之慢性移植物抗宿主疾病，須同時符合下列條件: ⅰ.肺功能檢查之 fev1<80%。 ⅱ.檢附 ct 報告帶有 air trapping, small airway thickening 或 bronchiectasis 等肺部侵犯的表徵。 ⅱ.需經事前審查核准後使用。 ⅲ.第一次療程為3個月，續用申請之療程以3個月為限，送審時需檢送療效評 估，每3個月評估一次。用藥後，若有疾病持續進展，則不予同意使用。 ⅳ.使用總療程以24個月為上限。 ⅴ.先前曾接受皮質類固醇（corticosteroids）後反應不佳需符合以下任一條 件： ⅰ.每日施用 ≥ 0.5 mg/kg/day prednisone 治療至少7天後，疾病仍持續進 展。 ⅱ.每日平均施用 ≥ 0.5 mg/kg/day prednisone (或隔日≥1 mg/kg) ，治療 至少1個月後，疾病仍未改善。 ⅲ.發生皮質類固醇依賴性：在逐漸調降皮質類固醇期間，無法將劑量調降至 每日0.25 mg/kg 以下維持至少7 天。 ⅳ.發生皮質類固醇不耐受性:初始治療後，發生 ctcae g3 嚴重不良反應之 情形。"},{"num":"9.56","name":"Brentuximab vedotin","brand":"Adcetris","cancers":["血液淋巴癌"],"types":["標靶"],"pre_review":true,"form_no":"","items":[{"num":"","header":"限用於成人患者：","subitems":[],"_is_unnumbered":true},{"num":"1","header":"何杰金氏淋巴瘤(HL)：","subitems":[{"num":"(1)","text":"與 doxorubicin、vinblastine 和 dacarbazine 併用適用於先前未曾接受治療， 且 IPS (International Prognostic Score)為4-7 分的 CD30+第 IV 期何杰金氏 淋巴瘤(HL)成人病人。"},{"num":"(2)","text":"CD30+何杰金氏淋巴瘤(HL)病患接受 ASCT 後仍具有高復發風險之病患：需先前 未曾使用過本品，並於 ASCT 前具有下列任一危險因子者： Ⅰ.對於第1線治療未達完全緩解。 Ⅱ.第1線治療結束後12個月內復發或惡化。 Ⅲ.ASCT 前出現的復發具有淋巴結外侵犯。"},{"num":"(3)","text":"治療復發或頑固型 CD30+何杰金氏淋巴瘤(HL)： Ⅰ.已接受自體幹細胞移植(ASCT)，或 Ⅱ.無法使用 ASCT 或多重藥物化療，且先前至少已接受兩種治療。"},{"num":"(4)","text":"須經事前審查核准後使用： Ⅰ.前述(1)之病患：首次申請療程以4個療程為限，再申請應檢附前次治療結果 評估資料。若病人病情已達完全緩解，得再給付2個療程；若病情惡化即須 停止使用。健保給付以6個療程為上限。 Ⅱ.前述(2)之病患：每次申請療程以4個療程為限，再申請應檢附疾病無惡化之 評估資料，若病情惡化即須停止使用。曾依本項核准使用之病患，若之後疾 病惡化或復發後將不再給付本藥品。 Ⅲ.前述(3)之病患：每次申請療程以4個療程為限，再申請應檢附前次治療結果 評估資料。若病人病情已達完全緩解，得再給付4個療程;若病情惡化即須停 止使用。 Ⅳ.同一病患於前述（1）、（2）及（3）之終身給付療程數以總共16個療程為上 限。"}],"_title":"何杰金氏淋巴瘤（HL）· CD30+"},{"num":"2","header":"全身性退行分化型大細胞淋巴瘤(systemic anaplastic large cell lymphoma； sALCL)：","subitems":[{"num":"(1)","text":"與 cyclophosphamide、doxorubicin 和 prednisone 併用適用於先前未曾接受 治療且為 ALK 陰性的全身性退行分化型大細胞淋巴瘤(systemic anaplastic large cell lymphoma；sALCL)成人病人。"},{"num":"(2)","text":"治療復發或頑固型全身性退行分化型大細胞淋巴瘤(systemic anaplastic large cell lymphoma；sALCL)。"},{"num":"(3)","text":"須經事前審查核准後使用： Ⅰ.前述(1)之病患：首次申請療程以4個療程為限，再申請應檢附前次治療結果 評估資料。若病人病情已達完全緩解，得再給付2個療程；若病情惡化即須停 止使用。健保給付以6個療程為上限。 Ⅱ.前述(2)之病患：每次申請療程以4個療程為限，再申請應檢附前次治療結果 評估資料。若病人病情已達完全緩解，得再給付4個療程;若病情惡化即須 :"(1)","text":".用藥紀錄(證明為有症狀的骨轉移、需常規使用止痛藥物)"},{"num":"(2)","text":".三個月內影像報告證明骨轉移≧2處"},{"num":"(3)","text":".三個月內影像報告證明無臟器轉移"}]},{"num":"4","header":"不得合併使用 abiraterone、enzalutamide 及其他治療因惡性腫瘤伴隨骨骼事件之 藥品，如 denosumab、bisphosphonates 等。","subitems":[]}],"per_cancer":null,"common_data":null,"st":"radium-223 xofigo 限用於治療去勢抗性攝護腺癌(castration-resistant prostate cancer)病患，其合併有症狀的骨轉移且尚未有臟器轉移者，且病人須符合下列三項條件： 患者須合併有症狀之骨轉移且骨轉移≧2處 每位患者最高使用六個療程 須經事前審查核准後使用，申請時需檢附： .用藥紀錄(證明為有症狀的骨轉移、需常規使用止痛藥物) .三個月內影像報告證明骨轉移≧2處 .三個月內影像報告證明無臟器轉移 不得合併使用 abiraterone、enzalutamide 及其他治療因惡性腫瘤伴隨骨骼事件之 藥品，如 denosumab、bisphosphonates 等。"},{"num":"9.69","name":"免疫檢查點抑制劑","brand":"","cancers":["乳癌","肺癌","食道癌","大腸直腸癌","血液淋巴癌","肝癌","膽道癌","胃癌","泌尿癌","頭頸癌","其他癌"],"types":["免疫"],"pre_review":true,"form_no":"","items":[{"num":"1","header":"本類藥品得於藥品許可證登載之適應症及藥品仿單內，單獨使用於下列患者：","subitems":[{"num":"(1)","text":"黑色素瘤：腫瘤無法切除或轉移之第三期或第四期黑色素瘤病人，先前曾接受過 至少一次全身性治療失敗者。"},{"num":"(2)","text":"非小細胞肺癌： I. 鞏固治療：限 durvalumab 用於第三期局部晚期、無法手術切除且腫瘤表現 PD-L1 ≥ 1%之非小細胞肺癌成人病人，非鱗狀癌者需為 EGFR/ALK/ROS-1腫瘤 基因原生型、鱗狀癌者需為 EGFR/ALK 腫瘤基因原生型，病人須於接受根治性 同步放射治療合併至少2個週期含鉑化療後無惡化(無 PD)，且至多使用12個月。 II. 非小細胞肺癌第一線用藥：轉移性非小細胞肺癌成人病人，非鱗狀癌者需為 EGFR/ALK/ROS-1腫瘤基因原生型、鱗狀癌者需為 EGFR/ALK 腫瘤基因原生型。 III. 鱗狀非小細胞肺癌第二線用藥：先前已使用過 platinum 類化學治療失敗後， 又有疾病惡化，且 EGFR/ALK 腫瘤基因為原生型之晚期鱗狀非小細胞肺癌成人 病人。 IV. 肺腺癌第三線用藥：先前已使用過 platinum 類及 docetaxel/paclitaxel 類 二線(含)以上化學治療均失敗，又有疾病惡化，且 EGFR/ALK/ROS-1腫瘤基因 為原生型之晚期非小細胞肺腺癌成人病人。"},{"num":"(3)","text":"典型何杰金氏淋巴瘤：先前已接受自體造血幹細胞移植(HSCT)與移植後 brentuximab vedotin (BV)治療，但又復發或惡化的典型何杰金氏淋巴瘤成人患 者。"},{"num":"(4)","text":"泌尿道上皮癌：使用含 atezolizumab 藥品成分須於113年8月1日前審核同意用 藥。 I.不適合接受化學治療之轉移性泌尿道上皮癌成人患者，且需符合下列條件之 一： i.CTCAE(the common terminology criteria for adverse events) v4.0 grade≧2 audiometric hearing loss ii.CTCAE v4.0 grade≧2 peripheral neuropathy iii.CIRS(the cumulative illness rating scale) score >6 II. 先前已使用過 platinum 類化學治療失敗後疾病惡化的局部晚期無法切除或 轉移性泌尿道上皮癌成人患者。 III.限 avelumab 用於接受第一線含鉑化學治療4至6個療程後，疾病未惡化，且 達部分緩解（PR）或疾病呈穩定狀態者(SD)之無法手術切除局部晚期(stage Ⅲ)或轉移性泌尿上皮癌(stage Ⅳ)成人患者之維持療法。"},{"num":"(5)","text":"頭頸部鱗狀細胞癌(不含鼻咽癌)： I.先前未曾接受全身性治療且無法手術切除之復發性或轉移性(第三期或第四期) 頭頸部鱗狀細胞癌成人患者。 II.先前已使用過 platinum 類化學治療失敗後，又有疾病惡化的復發性或轉移性 (第三期或第四期)頭頸部鱗狀細胞癌成人患者。(108/4/1、109/11/1、"},{"num":"(6)","text":"轉移性胃癌：先前已使用過二線(含)以上化學治療均失敗，又有疾病惡化的轉移 性胃腺癌成人患者，且於109年4月1日前經審核同意用藥，後續評估符合續用申 請條件者。"},{"num":"(7)","text":"晚期腎細胞癌：先前已使用過至少二線標靶藥物治療均失敗，又有疾病惡化之晚 期腎細胞癌，其病理上為亮細胞癌(clear cell renal carcinoma)之成人患者。"},{"num":"(8)","text":"晚期肝細胞癌：需同時符合下列所有條件： Ⅰ.Child-Pugh A class 肝細胞癌成人患者。 Ⅱ.先前經 T.A.C.E.於12個月內>=3次局部治療失敗者。 Ⅲ.已使用過至少一線標靶藥物治療失敗，又有疾病惡化者。本類藥品與 regorafenib、ramucirumab 僅能擇一使用，且治療失敗時不可互換。 Ⅳ.未曾進行肝臟移植。 Ⅴ.於109年4月1日前經審核同意用藥，後續評估符合續用申請條件者。"},{"num":"(9)","text":"默克細胞癌：限 avelumab 用於先前已使用過 platinum 類化學治療失敗後，又有 疾病惡化之轉移性第四期默克細胞癌(Merkel Cell Carcinoma)之成人患者。"},{"num":"(10)","text":"食道鱗狀細胞癌：限 nivolumab 用於曾接受合併含鉑及 fluoropyrimidine 化學 治療之後惡化的無法切除晚期或復發性食道鱗狀細胞癌病人。(113/4/1、"},{"num":"(11)","text":"大腸直腸癌：限 pembrolizumab 做為無法切除或轉移性高微衛星不穩定性(MSI- H)或錯誤配對修復功能不足性(dMMR)大腸直腸癌(CRC)之成年病人第一線治療。"}]},{"num":"2","header":"本類藥品得於藥品許可證登載之適應症及藥品仿單內，併用其他藥品於下列患者：","subitems":[{"num":"(1)","text":"晚期肝細胞癌第一線用藥: Ⅰ.限 atezolizumab 與 bevacizumab 併用，或限 durvalumab 與 tremelimumab 併 用，適用於治療未曾接受全身性療法之轉移性或無法手術切除且不適合局部 治療或局部治療失敗之 Child-Pugh A class 晚期肝細胞癌成人患者，並符合 下列條件之一： i.肝外轉移（遠端轉移或肝外淋巴結侵犯）。 ii.大血管侵犯（腫瘤侵犯主門靜脈或侵犯左/右靜脈第一或第二分支）。 iii.經導管動脈化學藥物栓塞治療（Transcatheter arterial chemo embolization, T.A.C.E.）失敗者，需提供患者於12個月內>=3次局部治 療之紀錄。 II.須排除有以下任一情形： i.曾接受器官移植。 ii.正在接受免疫抑制藥物治療。 iii.有上消化道出血之疑慮且未接受完全治療 (須有半年內之內視鏡評估報 告)。 III.sorafenib、lenvatinib、atezolizumab 與 bevacizumab 併用、durvalumab 與 tremelimumab 併用僅得擇一給付，不得互換。 IV.atezolizumab 與 bevacizumab 併用或 durvalumab 與 tremelimumab 併用治療 失敗後，不得申請使用 regorafenib 或 ramucirumab。"},{"num":"(2)","text":"非小細胞肺癌： I. 轉移性鱗狀非小細胞肺癌第一線用藥：限 pembrolizumab 與 carboplatin 及 paclitaxel 併用至多使用4個療程，接續單用 pembrolizumab 治療。 II. 轉移性非鱗狀非小細胞肺癌第一線：限 pembrolizumab 與 pemetrexed(限使 用 Pexeda、Apeta 或 Pemetrexed Sandoz)及含鉑類化學療法併用，或限 atezolizumab 與 bevacizumab(限使用 Alymsys、Avastin、Abevmy、 Vegzelma 或 Mvasi)及 carboplatin、paclitaxel 併用，做為轉移性且不具 有 EGFR/ALK/ROS-1腫瘤基因異常的非鱗狀非小細胞肺癌第一線治療。"},{"num":"(3)","text":"小細胞肺癌：限 atezolizumab 與 carboplatin 及 etoposide 併用，或 durvalumab 與 etoposide 及 carboplatin 或 cisplatin 兩者之一併用，適用於先 前未曾接受化療，且無腦部或無脊髓轉移之擴散期(extensive stage)小細胞肺 癌成人患者。"},{"num":"(4)","text":"惡性肋膜間皮瘤：限 ipilimumab 與 nivolumab 併用於無法切除之惡性肋膜間皮瘤 且病理組織顯示為非上皮型(Non-epithelioid)成人病人的第一線治療。"},{"num":"(5)","text":"胃癌（不含胃腸基質瘤及神經內分泌腫瘤/癌）：(113/4/1、113/6/1、115/2/1、 I. 限 nivolumab 併用 fluoropyrimidine（5-FU 或 capecitabine）及 oxaliplatin，用於第一線治療晚期或轉移性且不具有 HER2過度表現的胃癌病 人。 II. 與 zolbetuximab 僅得擇一使用，且治療失敗時不可互換。"},{"num":"(6)","text":"膽道癌第一線用藥：限 durvalumab 與 cisplatin 及 gemcitabine 併用至多使用8 個療程，接續單用 durvalumab 於先前未接受過治療或不可手術之局部晚期或轉 移性膽道癌 (biliary tract cancer)，並須排除以下任一情形： Ⅰ.壺腹癌。 Ⅱ.曾接受異體器官移植。 Ⅲ.具有或曾有活動性自體免疫或發炎性疾病。"},{"num":"(7)","text":"早期三陰性乳癌：非轉移性、第 II 期至第 IIIb 期（cT1c N1-2 或 T2-4 N0-2） 成年病人： I.術前前導性治療：限 pembrolizumab 每3週1次與 carboplatin 和 paclitaxel 併 用至多4個療程，接續限 pembrolizumab 每3週1次與 cyclophosphamide 和 doxorubicin 或 epirubicin 併用至多4個療程，做為初診斷病人前導性治療 用藥。 II.術後輔助治療：上述病人接受過術前前導性治療後，限手術後未達 pCR 者， 單用 pembrolizumab 每3週1次，做為輔助治療用藥，且至多使用9個療程。 III.上述 pembrolizumab 用於早期三陰性乳癌依前述療程規定至多使用17個療程， 且用於術後輔助治療，pembrolizumab 與 olaparib 僅能擇一支付。"},{"num":"(8)","text":"食道鱗狀細胞癌：限 nivolumab 與 fluoropyrimidine 及 cisplatin 或 oxaliplatin 併用，用於無法接受化學放射性治療或手術切除等治癒性治療之晚 期或轉移性食道鱗狀細胞癌成人病人的第一線治療。"},{"num":"(9)","text":"泌尿道上皮癌：限 nivolumab 與 cisplatin 及 gemcitabine 併用至多6個療程，接 續限單用 nivolumab，做為無法切除或轉移性泌尿道上皮癌成人病人的第一線治療。"}]},{"num":"3","header":"使用條件：","subitems":[{"num":"(1)","text":"病人身體狀況良好(ECOG≦1)。"},{"num":"(2)","text":"病人之心肺與肝腎功能須符合下列所有條件： I.NYHA(the New York Heart Association) Functional Class I 或 II II.GOT<60U/L 及 GPT<60U/L，且 T-bilirubin<1.5mg/dL (晚期肝細胞癌以及膽道癌 病人可免除此條件) III.腎功能：(晚期腎細胞癌病人可免除此條件) i. 泌 尿 道 上 皮 癌 第 一 線 用 藥 ： 單 獨 使 用 pembrolizumab 須 符 合 2 2 eGFR>30mL/min/1.73m 且<60mL/min/1.73m ；nivolumab 併用化療須符合 eGFR ≥60mL/min/1.73m2。 ii.泌尿道上皮癌第二線用藥：eGFR>30mL/min/1.73m2。 iii.泌尿道上皮癌維持治療：eGFR>30mL/min/1.73m2。 iv.其他癌別：Creatinine<1.5mg/dL 且 eGFR>60mL/min/1.73m2。"},{"num":"(3)","t 、durvalumab 用於鞏固治療自初次處 方用藥日起算1年）。"},{"num":"(6)","text":"需經單筆電子申請事前審查核准後使用，申請時需上傳病歷資料(不適用特殊病 例事前審查，亦不適用緊急報備，惟已獲核定用藥之病人因轉院可緊急報備申 請續用)。"},{"num":"(7)","text":"每次申請以12週為限，初次申請時需檢附以下資料：(108/6/1、109/11/1、 I.確實患有相關癌症之病理或細胞檢查報告，黑色素瘤患者需另檢附 BRAF 腫瘤 基因檢測結果、非小細胞肺癌患者需另檢附符合給付適應症內容規定之腫瘤基 因檢測結果報告，上述基因檢測須符合全民健康保險藥品給付規定之通則十二。 Ⅱ.生物標記表現量檢測報告：PD-L1表現量檢測結果需符合全民健康保險藥品 給付規定之通則十二。 Ⅲ.病人身體狀況良好(ECOG≦1)及心肺與肝腎功能之評估資料。 IV.病人12週內之疾病影像檢查及報告(如胸部 X 光、電腦斷層或其他可作為評估 的影像)，此影像證明以可測量(measurable)的病灶為優先，如沒有可以測量 的病灶，則可評估(evaluable)的病灶亦可採用。 備註：上述影像檢查之給付範圍不包括正子造影(PET)。 V.先前已接受過之治療與完整用藥資料(如化學治療、標靶藥物及自費等用藥之 劑量及療程)及其治療結果；典型何杰金氏淋巴瘤患者需另檢附自體造血幹細 胞移植之病歷紀錄；肝細胞癌患者需另檢附 T.A.C.E.治療紀錄。 VI.使用免疫檢查點抑制劑之治療計畫(treatment protocol)。 Ⅶ.單獨使用 pembrolizumab 於泌尿道上皮癌第一線用藥時，須另檢附下列其中 一項佐證資料： i.CTCAE(the common terminology criteria for adverse events) v4.0 grade≧2 audiometric hearing loss ⅱ.CTCAE v4.0 grade≧2 peripheral neuropathy ⅲ.CIRS(the cumulative illness rating scale) score >6 Ⅷ.使用於早期三陰性乳癌用藥時，初次申請時需檢附 ER、PR 及 HER2為陰性之 檢測報告。 IX. 其他佐證病歷資料。"},{"num":"(8)","text":"用藥後每12週至少評估一次，以 i-RECIST 標準(HCC 患者以 mRECIST 標準)評定藥物療效反應，依下列原則申請續用： I.有療效反應 iPR(PR)、iCR(CR)者，或限使用 nivolumab、avelumab、ipilimumab 或 cemiplimab 後評估疾病呈穩定狀態 iSD(SD)者，得繼續用藥； II.初始用藥後，如評估疾病呈未確認疾病惡化者(iUPD)，可持續用藥4-8週後再次評估；如再次評估結果為疾病惡化 iCPD(PD)者，應停止用藥。 III.出現疾病惡化 iCPD(PD)或出現中、重度或危及生命之藥物不良反應者，應停止用藥； IV.使用 atezolizumab、pembrolizumab、durvalumab、tremelimumab 後評估疾病呈穩定狀態者(SD)，可持續再用藥12週，並於12週後再次評估；經連續二次評估皆為 SD 者，不得申請續用。durvalumab 用於非小細胞肺癌之鞏固治療不在此限。 V.使用於早期三陰性乳癌，術前前導性治療腫瘤惡化 iCPD 者，或術後輔助治療復發者，不得申請續用。"},{"num":"(9)","text":"申請續用時，需檢附病人12週內之評估資料如下： I.病人身體狀況良好(ECOG≦1)及心肺與肝腎功能之評估資料。 II.以 i-RECIST 標準(HCC 患者以 mRECIST 標準)評定之藥物療效反應(PR、CR、 SD)資料、影像檢查及報告(如胸部 X 光、電腦斷層或其他可作為評估的影像)， 此影像證明以可測量(measurable)的病灶為優先，如沒有可以測量的病灶，則 可評估(evaluable)的病灶亦可採用。 備註：上述影像檢查之給付範圍不包括正子造影(PET)。 Ⅲ.單獨使用 pembrolizumab 於泌尿道上皮癌第一線用藥時，須另檢附下列其中 一項佐證資料： i.CTCAE(the common terminology criteria for adverse events) v4.0 grade≧2 audiometric hearing loss ⅱ.CTCAE v4.0 grade≧2 peripheral neuropathy ⅲ.CIRS(the cumulative illness rating scale) score >6 IV.使用於早期三陰性乳癌術後輔助治療時，須檢附於乳房和/或手術切除的淋 巴結中發現有殘餘的侵襲性癌症(non-pCR)佐證。 Ⅴ其他佐證病歷資料。"}]},{"num":"4","header":"登錄與結案作業：","subitems":[{"num":"(1)","text":"醫師處方使用本類藥品，倘病人結束治療、停止用藥、未通過續用申請或達給付 時程期限時，醫事機構須在28天內於 VPN 系統登錄結案。逾期未登錄結案者， 系統自動結案，且不予支付該個案自前次事前審查核定日後申報之藥費。"},{"num":"(2)","text":"已結案者自結案日後不予支付藥費。"}]}],"per_cancer":{"其他癌":{"subtitles":["黑色素瘤","默克細胞癌","惡性肋膜間皮瘤"],"single_use":["**黑色素瘤**：腫瘤無法切除或轉移之第三期或第四期黑色素瘤病人，先前曾接受過至少一次全身性治療失敗者。","**默克細胞癌**：限 avelumab 用於先前已使用過 platinum 類化學治療失敗後,又有疾病惡化之轉移性第四期默克細胞癌(Merkel Cell Carcinoma)成人患者。"],"combo_use":["**惡性肋膜間皮瘤**:限 ipilimumab 與 nivolumab 併用於無法切除之惡性肋膜間皮瘤且病理組織顯示為非上皮型(Non-epithelioid)成人病人的第一線治療。"],"pdl1":"黑色素瘤 (P001):pembrolizumab、nivolumab 不需檢附 PD-L1 報告。\n默克細胞癌 (P091):avelumab 不需檢附報告。\n惡性肋膜間皮瘤 (P111,ipilimumab 併用 nivolumab):nivolumab 不需檢附報告，須病理組織為非上皮型(Non-epithelioid)。","notes":["黑色素瘤患者另檢附 BRAF 腫瘤基因檢測結果。"]},"肺癌":{"subtitles":["非小細胞肺癌","小細胞肺癌"],"single_use":["**非小細胞肺癌·鞏固治療**:限 durvalumab 用於第三期局部晚期、無法手術切除且腫瘤表現 PD-L1 ≥ 1% 之非小細胞肺癌成人病人,非鱗狀癌者需為 EGFR/ALK/ROS-1 腫瘤基因原生型、鱗狀癌者需為 EGFR/ALK 腫瘤基因原生型。病人須於接受根治性同步放射治療合併至少 2 個週期含鉑化療後無惡化(無 PD),且至多使用 12 個月。","**非小細胞肺癌第一線用藥(單用)**:轉移性非小細胞肺癌成人病人,非鱗狀癌者需為 EGFR/ALK/ROS-1 腫瘤基因原生型、鱗狀癌者需為 EGFR/ALK 腫瘤基因原生型。","**鱗狀非小細胞肺癌第二線用藥**:先前已使用過 platinum 類化學治療失敗後,又有疾病惡化,且 EGFR/ALK 腫瘤基因為原生型之晚期鱗狀非小細胞肺癌成人病人。","**肺腺癌第三線用藥**:先前已使用過 platinum 類及 docetaxel/paclitaxel 類二線(含)以上化學治療均失敗,又有疾病惡化,且 EGFR/ALK/ROS-1 腫瘤基因為原生型之晚期非小細胞肺腺癌成人病人。"],"combo_use":["**非小細胞肺癌術前輔助治療(併用化療)**:限可切除（腫瘤≧4 公分或淋巴結陽性 N1/N2(排除 N3)，且無遠端轉移 M0）、不具 EGFR 或 ALK 腫瘤基因異常之成人病人，至多 3 個療程。非鱗狀:nivolumab 與 pemetrexed(限使用 Pexeda、Apeta 或 Pemetrexed Sandoz)及含鉑化療併用;鱗狀:nivolumab 與含鉑化療併用。(115/6/1 新增)","**轉移性鱗狀非小細胞肺癌第一線用藥(併用化療)**:限 pembrolizumab 與 carboplatin 及 paclitaxel 併用至多使用 4 個療程,接續單用 pembrolizumab 治療。","**轉移性非鱗狀非小細胞肺癌第一線(併用化療)**:限 pembrolizumab 與 pemetrexed (限使用 Pexeda、Apeta 或 Pemetrexed Sandoz)及含鉑類化學療法併用,或限 atezolizumab 與 bevacizumab (限使用 Alymsys、Avastin、Abevmy、Vegzelma 或 Mvasi)及 carboplatin、paclitaxel 併用,做為轉移性且不具有 EGFR/ALK/ROS-1 腫瘤基因異常的非鱗狀非小細胞肺癌第一線治療。","**小細胞肺癌(併用化療)**:限 atezolizumab 與 carboplatin 及 etoposide 併用,或 durvalumab 與 etoposide 及 carboplatin 或 cisplatin 兩者之一併用,適用於先前未曾接受化療,且無腦部或無脊髓轉移之擴散期(extensive stage)小細胞肺癌成人患者。"],"pdl1":"非小細胞肺癌術前輔助治療(併用) (P016):nivolumab 不需檢附報告。\n非小細胞肺癌鞏固治療 (P015):durvalumab 須 PD-L1≥1%。\n鱗狀/非鱗狀非小細胞肺癌第一線用藥(單用) (P013):pembrolizumab 須 TPS≥50%、nivolumab 須 TC≧50% 或 IC≧10%、cemiplimab 須 TPS≥50%。\n非鱗狀非小細胞肺癌第一線用藥(併用) (P013):pembrolizumab、atezolizumab 不需檢附報告。\n鱗狀非小細胞肺癌第二線用藥 (P011):pembrolizumab 須 TPS≥50%、nivolumab 須 TC≧50%、atezolizumab 須 TC≧50% 或 IC≧10%。\n非鱗狀非小細胞肺癌第三線用藥 (P012):pembrolizumab 須 TPS≥50%、nivolumab 須 TC≧50%、atezolizumab 須 TC≧50% 或 IC≧10%。\n鱗狀非小細胞肺癌第一線用藥(併用化療) (P014):pembrolizumab 須 TPS 1~49%。\n小細胞肺癌(併用化療) (P021):atezolizumab、durvalumab 不需檢附報告。","notes":["非小細胞肺癌患者另檢附符合給付適應症內容規定之腫瘤基因檢測結果報告。","durvalumab 用於非小細胞肺癌之鞏固治療給付時程期限自初次處方用藥日起算 1 年。"]},"血液淋巴癌":{"subtitles":["典型何杰金氏淋巴瘤"],"single_use":["**典型何杰金氏淋巴瘤**:先前已接受自體造血幹細胞移植(HSCT)與移植後 brentuximab vedotin (BV)治療,但又復發或惡化的典型何杰金氏淋巴瘤成人患者。"],"combo_use":[],"pdl1":"典型何杰金氏淋巴瘤 (P031):pembrolizumab、nivolumab 不需檢附報告;atezolizumab 尚未給付。","notes":["需另檢附自體造血幹細胞移植之病歷紀錄。"]},"泌尿癌":{"subtitles":["泌尿道上皮癌","晚期腎細胞癌"],"single_use":["**晚期腎細胞癌**:先前已使用過至少二線標靶藥物治療均失敗,又有疾病惡化之晚期腎細胞癌,其病理上為亮細胞癌(clear cell renal carcinoma)之成人患者。","**泌尿道上皮癌(不適合化療)**:不適合接受化學治療之轉移性泌尿道上皮癌成人患者,且需符合下列條件之一:\n　i. CTCAE v4.0 grade≧2 audiometric hearing loss\n　ii. CTCAE v4.0 grade≧2 peripheral neuropathy\n　iii. CIRS (the cumulative illness rating scale) score >6","**泌尿道上皮癌第二線用藥**:先前已使用過 platinum 類化學治療失敗後疾病惡化的局部晚期無法切除或轉移性泌尿道上皮癌成人患者。","**泌尿道上皮癌維持療法**:限 avelumab 用於接受第一線含鉑化學治療 4 至 6 個療程後,疾病未惡化,且達部分緩解(PR)或疾病呈穩定狀態(SD)之無法手術切除局部晚期(stage Ⅲ)或轉移性泌尿上皮癌(stage Ⅳ)成人患者之維持療法。"],"combo_use":["**泌尿道上皮癌第一線用藥(併用化療)**:限 nivolumab 與 cisplatin 及 gemcitabine 併用至多 6 個療程,接續限單用 nivolumab,做為無法切除或轉移性泌尿道上皮癌成人病人的第一線治療。"],"pdl1":"晚期腎細胞癌 (P061):nivolumab、ipilimumab 不需檢附報告。\n泌尿道上皮癌維持療法 (P043):avelumab 不需檢附報告。\n泌尿道上皮癌第一線用藥(單用) (P042):pembrolizumab 須 CPS≥10、atezolizumab (113 年 8 月 1 日前審核同意符合續用申請條件者)。\n泌尿道上皮癌第一線用藥(併用化療) (P044):nivolumab 須 TC≥1%。\n泌尿道上皮癌第二線用藥 (P041):pembrolizumab 須 CPS≥10、nivolumab 須 TC≧5%、atezolizumab IC≧5% (113 年 8 月 1 日前審核同意符合續用申請條件者)。","notes":["使用含 atezolizumab 藥品成分須於 113 年 8 月 1 日前審核同意用藥。","腎功能要求:晚期腎細胞癌可免除腎功能條件;泌尿道上皮癌第一線單用 pembrolizumab 須符合 eGFR>30 且 <60 mL/min/1.73m²;nivolumab 併用化療須符合 eGFR≥60 mL/min/1.73m²;泌尿道上皮癌第二線、維持治療須 eGFR>30 mL/min/1.73m²。","單獨使用 pembrolizumab 於泌尿道上皮癌第一線用藥時,須另檢附下列其中一項佐證:CTCAE v4.0 grade≧2 audiometric hearing loss / peripheral neuropathy 或 CIRS score >6。"]},"頭頸癌":{"subtitles":["頭頸部鱗狀細胞癌(不含鼻咽癌)"],"single_use":["**頭頸部鱗狀細胞癌第一線用藥**:先前未曾接受全身性治療且無法手術切除之復發性或轉移性(第三期或第四期)頭頸部鱗狀細胞癌成人患者。","**頭頸部鱗狀細胞癌第二線用藥**:先前已使用過 platinum 類化學治療失敗後,又有疾病惡化的復發性或轉移性(第三期或第四期)頭頸部鱗狀細胞癌成人患者。"],"combo_use":[],"pdl1":"頭頸部鱗狀細胞癌第一線用藥 (P082):pembrolizumab 須 CPS≥20。\n頭頸部鱗狀細胞癌第二線用藥 (P081):pembrolizumab 須 TPS≥50%、nivolumab 須 TC≧10%。","notes":["本適應症為「不含鼻咽癌」。","cetuximab 用於頭頸部鱗狀細胞癌(不含鼻咽癌)不在「治療期間不可合併申報該適應症之標靶藥物」之限制內。"]},"食道癌":{"subtitles":["食道鱗狀細胞癌"],"single_use":["**食道鱗狀細胞癌第二線用藥(單用)**:限 nivolumab 用於曾接受合併含鉑及 fluoropyrimidine 化學治療之後惡化的無法切除晚期或復發性食道鱗狀細胞癌病人。"],"combo_use":["**食道鱗狀細胞癌第一線用藥(併用化療)**:限 nivolumab 與 fluoropyrimidine 及 cisplatin 或 oxaliplatin 併用,用於無法接受化學放射性治療或手術切除等治癒性治療之晚期或轉移性食道鱗狀細胞癌成人病人的第一線治療。"],"pdl1":"食道鱗狀細胞癌第一線用藥(併用化療) (P102):nivolumab 須 TC≥1%。\n食道鱗狀細胞癌第二線用藥(單用) (P101):nivolumab 須 TC≥1%。","notes":[]},"大腸直腸癌":{"subtitles":["MSI-H/dMMR 大腸直腸癌"],"single_use":["**大腸直腸癌第一線(MSI-H/dMMR)**:限 pembrolizumab 做為無法切除或轉移性高微衛星不穩定性(MSI-H)或錯誤配對修復功能不足性(dMMR)大腸直腸癌(CRC)之成年病人第一線治療。"],"combo_use":[],"pdl1":"大腸直腸癌 (P141):pembrolizumab 不需檢附報告。","notes":["病人需符合 MSI-H 或 dMMR 之檢測條件。"]},"乳癌":{"subtitles":["早期三陰性乳癌"],"single_use":[],"combo_use":["**早期三陰性乳癌**:非轉移性、第 II 期至第 IIIb 期(cT1c N1-2 或 T2-4 N0-2)成年病人。\n\n**Ⅰ. 術前前導性治療**:限 pembrolizumab 每 3 週 1 次與 carboplatin 和 paclitaxel 併用至多 4 個療程,接續限 pembrolizumab 每 3 週 1 次與 cyclophosphamide 和 doxorubicin 或 epirubicin 併用至多 4 個療程,做為初診斷病人前導性治療用藥。\n\n**Ⅱ. 術後輔助治療**:上述病人接受過術前前導性治療後,限手術後未達 pCR 者,單用 pembrolizumab 每 3 週 1 次,做為輔助治療用藥,且至多使用 9 個療程。\n\n**Ⅲ. 療程上限**:上述 pembrolizumab 用於早期三陰性乳癌依前述療程規定至多使用 17 個療程,且用於術後輔助治療,pembrolizumab 與 olaparib 僅能擇一支付。"],"pdl1":"早期三陰性乳癌(併用化療) (P131):pembrolizumab 不需檢附報告;nivolumab、avelumab、durvalumab、atezolizumab、cemiplimab 尚未給付於此適應症。","notes":["初次申請時需檢附 ER、PR 及 HER2 為陰性之檢測報告。","術前前導性治療腫瘤惡化(PD)者,或術後輔助治療復發者,不得申請續用。","術後輔助治療續用時,須檢附於乳房和/或手術切除的淋巴結中發現有殘餘的侵襲性癌症(non-pCR)佐證。","給付時程期限:pembrolizumab 用於早期三陰性乳癌至多使用 17 個療程。"]},"肝癌":{"subtitles":["晚期肝細胞癌"],"single_use":["**晚期肝細胞癌(舊適應症)**:需同時符合下列所有條件:\n　Ⅰ. Child-Pugh A class 肝細胞癌成人患者。\n　Ⅱ. 先前經 T.A.C.E. 於 12 個月內 ≥3 次局部治療失敗者。\n　Ⅲ. 已使用過至少一線標靶藥物治療失敗,又有疾病惡化者。本類藥品與 regorafenib、ramucirumab 僅能擇一使用,且治療失敗時不可互換。\n　Ⅳ. 未曾進行肝臟移植。\n　Ⅴ. 於 109 年 4 月 1 日前經審核同意用藥,後續評估符合續用申請條件者。"],"combo_use":["**晚期肝細胞癌第一線用藥**:限 atezolizumab 與 bevacizumab 併用,或限 durvalumab 與 tremelimumab 併用,適用於治療未曾接受全身性療法之轉移性或無法手術切除且不適合局部治療或局部治療失敗之 Child-Pugh A class 晚期肝細胞癌成人患者,並符合下列條件之一:\n　i. 肝外轉移(遠端轉移或肝外淋巴結侵犯)。\n　ii. 大血管侵犯(腫瘤侵犯主門靜脈或侵犯左/右靜脈第一或第二分支)。\n　iii. 經導管動脈化學藥物栓塞治療(T.A.C.E.)失敗者,需提供患者於 12 個月內 ≥3 次局部治療之紀錄。"],"pdl1":"晚期肝細胞癌(P071,109 年 4 月 1 日前審核同意符合續用):pembrolizumab、atezolizumab 不需檢附報告。\n晚期肝細胞癌第一線用藥(併用)(P072):atezolizumab 不需檢附報告(併用 bevacizumab);durvalumab 不需檢附報告(併用 tremelimumab)。","notes":["晚期肝細胞癌、膽道癌病人可免除「GOT<60U/L 及 GPT<60U/L,且 T-bilirubin<1.5mg/dL」此條件。","晚期肝細胞癌第一線用藥之 sorafenib、lenvatinib、atezolizumab+bevacizumab、durvalumab+tremelimumab 僅得擇一給付,不得互換。","肝細胞癌患者需另檢附 T.A.C.E. 治療紀錄。","肝細胞癌須排除:曾接受器官移植、正在接受免疫抑制藥物、有上消化道出血疑慮且未接受完全治療(須有半年內之內視鏡評估報告)。"]},"膽道癌":{"subtitles":["膽道癌"],"single_use":[],"combo_use":["**膽道癌第一線用藥**:限 durvalumab 與 cisplatin 及 gemcitabine 併用至多使用 8 個療程,接續單用 durvalumab,於先前未接受過治療或不可手術之局部晚期或轉移性膽道癌(biliary tract cancer),並須排除以下任一情形:\n　Ⅰ. 壺腹癌。\n　Ⅱ. 曾接受異體器官移植。\n　Ⅲ. 具有或曾有活動性自體免疫或發炎性疾病。"],"pdl1":"膽道癌(併用化療)(P121):durvalumab 不需檢附報告。","notes":["晚期肝細胞癌、膽道癌病人可免除「GOT<60U/L 及 GPT<60U/L,且 T-bilirubin<1.5mg/dL」此條件。"]},"胃癌":{"subtitles":["胃癌(不含胃腸基質瘤及神經內分泌)"],"single_use":["**轉移性胃癌(舊適應症)**:先前已使用過二線(含)以上化學治療均失敗,又有疾病惡化的轉移性胃腺癌成人患者,且於 109 年 4 月 1 日前經審核同意用藥,後續評估符合續用申請條件者。"],"combo_use":["**胃癌第一線用藥(併用化療)**:限 nivolumab 併用 fluoropyrimidine(5-FU 或 capecitabine)及 oxaliplatin,用於第一線治療晚期或轉移性且不具有 HER2 過度表現的胃癌病人。"],"pdl1":"胃腺癌 (P051,109 年 4 月 1 日前審核同意符合續用):pembrolizumab 須 CPS≥1、nivolumab 不需檢附報告。\n胃癌第一線用藥(併用化療) (P052):nivolumab 須 CPS≥5。","notes":["胃癌與 zolbetuximab 僅得擇一使用,且治療失敗時不可互換。"]}},"common_data":["病人身體狀況良好(ECOG≦1)。","病人之心肺與肝腎功能須符合下列條件:\n　- NYHA Functional Class I 或 II\n　- GOT<60U/L 及 GPT<60U/L,且 T-bilirubin<1.5mg/dL (晚期肝細胞癌以及膽道癌病人可免除)\n　- 腎功能:Creatinine<1.5mg/dL 且 eGFR>60mL/min/1.73m² (其他癌別) / 各泌尿道上皮癌情境另有規定 (詳見泌尿癌備註)","每位病人每個適應症限給付一種免疫檢查點抑制劑且不得互換,治療期間亦不可合併申報該適應症之標靶藥物 (atezolizumab 與 bevacizumab 併用於晚期肝細胞癌第一線用藥及非鱗狀非小細胞肺癌第一線用藥除外),無效後或給付時程期滿後則不再給付該適應症相關之標靶藥物 (enfortumab vedotin 用於局部晚期或轉移性泌尿道上皮癌第三線用藥及 cetuximab 用於頭頸部鱗狀細胞癌(不含鼻咽癌)除外)。","給付時程期限:自初次處方用藥日起算 2 年 (pembrolizumab 用於早期三陰性乳癌至多 17 個療程、durvalumab 用於鞏固治療自初次處方用藥日起算 1 年)。","需經單筆電子申請事前審查核准後使用,申請時需上傳病歷資料。","每次申請以 12 週為限,初次申請時需檢附:病理或細胞檢查報告、PD-L1 表現量檢測報告、ECOG≤1 與心肺肝腎功能評估、12 週內影像檢查、先前治療與用藥資料、治療計畫(treatment protocol)等。","用藥後每 12 週至少評估一次,以 i-RECIST 標準(HCC 患者以 mRECIST 標準)評定藥物療效反應。","醫師處方使用本類藥品,倘病人結束治療、停止用藥、未通過續用申請或達給付時程期限時,醫事機構須在 28 天內於 VPN 系統登錄結案。"],"st":"免疫檢查點抑制劑  本類藥品得於藥品許可證登載之適應症及藥品仿單內，單獨使用於下列患者： 黑色素瘤：腫瘤無法切除或轉移之第三期或第四期黑色素瘤病人，先前曾接受過 至少一次全身性治療失敗者。 非小細胞肺癌： i. 鞏固治療：限 durvalumab 用於第三期局部晚期、無法手術切除且腫瘤表現 pd-l1 ≥ 1%之非小細胞肺癌成人病人，非鱗狀癌者需為 egfr/alk/ros-1腫瘤 基因原生型、鱗狀癌者需為 egfr/alk 腫瘤基因原生型，病人須於接受根治性 同步放射治療合併至少2個週期含鉑化療後無惡化(無 pd)，且至多使用12個月。 ii. 非小細胞肺癌第一線用藥：轉移性非小細胞肺癌成人病人，非鱗狀癌者需為 egfr/alk/ros-1腫瘤基因原生型、鱗狀癌者需為 egfr/alk 腫瘤基因原生型。 iii. 鱗狀非小細胞肺癌第二線用藥：先前已使用過 platinum 類化學治療失敗後， 又有疾病惡化，且 egfr/alk 腫瘤基因為原生型之晚期鱗狀非小細胞肺癌成人 病人。 iv. 肺腺癌第三線用藥：先前已使用過 platinum 類及 docetaxel/paclitaxel 類 二線(含)以上化學治療均失敗，又有疾病惡化，且 egfr/alk/ros-1腫瘤基因 為原生型之晚期非小細胞肺腺癌成人病人。 典型何杰金氏淋巴瘤：先前已接受自體造血幹細胞移植(hsct)與移植後 brentuximab vedotin (bv)治療，但又復發或惡化的典型何杰金氏淋巴瘤成人患 者。 泌尿道上皮癌：使用含 atezolizumab 藥品成分須於113年8月1日前審核同意用 藥。 i.不適合接受化學治療之轉移性泌尿道上皮癌成人患者，且需符合下列條件之 一： i.ctcae(the common terminology criteria for adverse events) v4.0 grade≧2 audiometric hearing loss ii.ctcae v4.0 grade≧2 peripheral neuropathy iii.cirs(the cumulative illness rating scale) score >6 ii. 先前已使用過 platinum 類化學治療失敗後疾病惡化的局部 直腸癌 (p141):pembrolizumab 不需檢附報告。 乳癌 早期三陰性乳癌 **早期三陰性乳癌**:非轉移性、第 ii 期至第 iiib 期(ct1c n1-2 或 t2-4 n0-2)成年病人。\n\n**ⅰ. 術前前導性治療**:限 pembrolizumab 每 3 週 1 次與 carboplatin 和 paclitaxel 併用至多 4 個療程,接續限 pembrolizumab 每 3 週 1 次與 cyclophosphamide 和 doxorubicin 或 epirubicin 併用至多 4 個療程,做為初診斷病人前導性治療用藥。\n\n**ⅱ. 術後輔助治療**:上述病人接受過術前前導性治療後,限手術後未達 pcr 者,單用 pembrolizumab 每 3 週 1 次,做為輔助治療用藥,且至多使用 9 個療程。\n\n**ⅲ. 療程上限**:上述 pembrolizumab 用於早期三陰性乳癌依前述療程規定至多使用 17 個療程,且用於術後輔助治療,pembrolizumab 與 olaparib 僅能擇一支付。 初次申請時需檢附 er、pr 及 her2 為陰性之檢測報告。 術前前導性治療腫瘤惡化(pd)者,或術後輔助治療復發者,不得申請續用。 術後輔助治療續用時,須檢附於乳房和/或手術切除的淋巴結中發現有殘餘的侵襲性癌症(non-pcr)佐證。 給付時程期限:pembrolizumab 用於早期三陰性乳癌至多使用 17 個療程。 早期三陰性乳癌(併用化療) (p131):pembrolizumab 不需檢附報告;nivolumab、avelumab、durvalumab、atezolizumab、cemiplimab 尚未給付於此適應症。"},{"num":"9.70","name":"Pertuzumab","brand":"Perjeta","cancers":["乳癌"],"types":["標靶"],"pre_review":true,"form_no":"","items":[{"num":"1","header":"本藥品與 trastuzumab 及化學療法併用於具 HER2過度表現（IHC3+或 FISH+），且具 腋下淋巴結轉移但無遠處臟器轉移之早期乳癌病人（113/12/1、114/5/1、","subitems":[{"num":"(1)","text":"使用於術前輔助治療，經外科手術後達病理上完全緩解者（pCR），得繼續使用至 18個療程為上限。"},{"num":"(2)","text":"若未接受術前輔助治療，即先行手術者，可給予術後輔助治療，以18個療程為使 用上限。"},{"num":"(3)","text":"下列Ｉ~Ⅲ使用於外科手術前後之總療程合併計算，依藥品仿單記載以18個療程 為上限： Ｉ：pertuzumab 與 trastuzumab 併用 Ⅱ：trastuzumab Ⅲ：pertuzumab 與 trastuzumab 皮下注射複方製劑(如 Phesgo)"},{"num":"(4)","text":"須經事前審查核准後使用，核准後每24週須檢附療效評估資料再次申請，若疾病 有惡化情形即不應再行申請。"}],"_title":"HER2+ 早期乳癌 · 與 trastuzumab＋化療"},{"num":"2","header":"轉移性乳癌","subitems":[{"num":"(1)","text":"Pertuzumab 與 trastuzumab 及 docetaxel 併用於治療轉移後未曾以抗 HER2或化 學療法治療之 HER2過度表現(IHC3+或 FISH+)轉移性乳癌病人。(108/12/1、"},{"num":"(2)","text":"須經事前審查核准後使用，核准後每18週須檢附療效評估資料再次申請，若疾病 有惡化情形即不應再行申請，每位病人至多給付18個月為限。"},{"num":"(3)","text":"下列Ｉ~Ⅱ使用於轉移性乳癌總療程合併計算，以全部18個月為上限： Ｉ：pertuzumab 與 trastuzumab 併用 Ⅱ：pertuzumab 與 trastuzumab 皮下注射複方製劑(如 Phesgo)"},{"num":"(4)","text":"先前於早期乳癌已使用 pertuzumab 與 trastuzumab 併用或使用 pertuzumab 與 trastuzumab 皮下注射複方製劑(如 Phesgo)者，不得再次申請 pertuzumab 與 trastuzumab 併用，惟於早期乳癌治療結束至首次疾病復發轉移時間超過12個月 以上者得再次申請。"}],"_title":"H 11/8/1、113/6/1、 I.每次申請之療程以6個月為限。 Ⅱ.初次申請時需檢附 germline or somatic BRCA 1/2突變檢測報告或 HRD 陽性 檢測報告，且需符合全民健康保險藥品給付規定之通則十二。 (111/6/1、 Ⅲ.再次申請必須提出客觀證據（如：影像學）證實無惡化，才可繼續使用。"},{"num":"(5)","text":"用於具 germline or somatic BRCA 1/2 致病性或疑似致病性突變時， olaparib 與 niraparib 僅能擇一使用，除因耐受不良，不得互換。(112/1/1、"},{"num":"(6)","text":"倘因併用 bevacizumab 耐受性不良，在維持性治療可再換成 olaparib 單獨使 用，總療程數合併計算，限用兩年。"},{"num":"(7)","text":"niraparib 使用時，體重大於(含)77公斤且基期血小板高於(含)15萬/uL，每 日最多使用300mg；體重小於77公斤或基期血小板低於15萬/uL，每日最多使用 200mg。"},{"num":"(8)","text":"FIGO Stage IV disease 具 germline or somatic BRCA 1/2致病性或疑似致病 性突變者，若已經申請 niraparib 用於第一線化學治療後維持性治療時不得另 外申請 bevacizumab 併用，除因 niraparib 耐受性不良，在維持性治療可再換 成 bevacizumab(除 Zirabev 以外)單獨使用，總申請療程以17個療程為上限。"}],"_title":"卵巢／輸卵管／腹膜癌 · 維持（olaparib／niraparib）"},{"num":"2","header":"三陰性乳癌(olaparib、talazoparib)：(109/11/1、111/6/1、111/8/1、112/1/1、","subitems":[{"num":"(1)","text":"olaparib 單獨使用於曾接受前導性、術後輔助性或轉移性化療，且具 germline BRCA 1/2致病性或疑似致病性突變之三陰性(荷爾蒙接受體及 HER2 受體皆為陰性)轉移性乳癌病人。"},{"num":"(2)","text":"talazoparib 限用於治療同時符合下列條件之18歲以上局部晚期或轉移性乳癌 病患： I.曾接受前導性、術後輔助性或轉移性化療者，或是無法接受化療者。 Ⅱ.具 germline BRCA 1/2突變 Ⅲ.第二型人類表皮生長因子接受體(HER2)、雌激素受體(ER)以及黃體素受體 (PR)均呈現陰性。"},{"num":"(3)","text":"須經事前審查核准後使用：(109/11/1、111/6/1、111/8/1、112/1/1、 I.每次申請之療程以3個月為限。 Ⅱ.初次申請時需檢附 ER、PR、HER2皆為陰性之檢測報告，以及 germline BRCA 1/2突變之檢測報告，且需符合全民健康保險藥品給付規定之通則十二。 Ⅲ.再次申請必須提出客觀證據（如：影像學）證實無惡化，才可繼續使 用。"},{"num":"(4)","text":"Olaparib 與 talazoparib 僅得擇一使用，除因耐受性不良，不得互換。"}],"_title":"三陰性乳癌 · gBRCA（olaparib／talazoparib）"},{"num":"3","header":"去勢療法無效的轉移性攝護腺癌 (mCRPC) (olaparib)：（112/11/1、113/6/1、","subitems":[{"num":"(1)","text":"單獨使用於具 germline or somatic BRCA 1/2致病性或疑似致病性突變且先前 接受過新荷爾蒙藥物(novel hormonal agents)治療後惡化之成人病人。"},{"num":"(2)","text":"併用 abiraterone 及 prednisone 或 prednisolone，用於具 germline 或 somatic BRCA 1/2致病性或疑似致病性突變且尚未接受化學治療之成人病 人： I.需符合下列條件之 一： i.未曾使用新型荷爾蒙藥品(abiraterone、apalutamide、darolutamide 和 enzalutamide)治療前列腺癌。 ii.於 mCRPC 階段使用 abiraterone 治療未超過4個月且使用期間未惡化。 Ⅱ.不論病人處於轉移或非轉移的狀態下，新型荷爾蒙藥品(abiraterone、 apalutamide、darolutamide 和 enzalutamide) ，及 olaparib 與 abiraterone 併用，終生僅能接受一種治療，且除非出現嚴重不耐受反應導致必須永久停止 治療，不得互換。"},{"num":"(3)","text":"經事前審查核准後使用，每3個月需再次申請： Ⅰ.初次申請時需檢附 germline or somatic BRCA 1/2突變檢測報告，且需符合 全民健康保險藥品給付規定之通則十二。 Ⅱ.申請時需檢附病理報告、使用雄性素去除療法紀錄及系列 PSA 和睪固酮數 據。 Ⅲ.再申請時若 PSA 值下降未超過治療前的50%以上，則需停藥。 IV.下降達最低值後之持續追蹤出現 PSA 較最低值上升50%以上且 PSA≧2ng/ml， 則需停藥，但影像學證據尚無疾病進展者，可以繼續使用。"},{"num":"(3)","text":"不得合併化療使用。"}],"_title":"mCRPC · gBRCA（olaparib）"},{"num":"4","header":"高復發風險之早期乳癌(olaparib)：","subitems":[{"num":"(1)","text":"Olaparib 適用於曾接受前導性化療或術後輔助性化療，且具遺傳性 BRCA1/2 (germline BRCA1/2)突變併 HER2陰性而有高復發風險之早期乳癌成年病人術 後輔助治療，依藥品仿單記載以1年為上限。"},{"num":"(2)","text":"病人須完成至少6個週期的前導性化療或術後輔助性化療，且化療處方須含有 anthracyclines 類藥物、taxane 類藥物，或兩者的複方；亦允許含鉑化療。"},{"num":"(3)","text":"病人須在最後一次治療(包括手術、化療或放療)完成後的12週內使用 olaparib。"},{"num":"(4)","text":"須符合下列之高復發風險條件： Ⅰ.三陰性乳癌： i.針對曾接受前導性化療的病人，須符合於乳房和/或手術切除的淋巴結中發 現有殘餘的侵襲性癌症(non-pCR)。 ii.針對曾接受手術且接續術後輔助性化療的病人，須具有腋窩淋巴結陽性 (≧pN1)，或腋窩淋巴結陰性(pN0)且原發性病理腫瘤大小≧2公分(≧pT2)。 Ⅱ.HR 陽性且 HER2陰性乳癌： i.針對曾接受前導性化療的病人，須為 non-pCR。 ii 針對曾接受手術且接續術後輔助性化療的病人，須具有4個以上經病理學證 實的陽性淋巴結。"},{"num":"(5)","text":"須經事前審查核准後使用： Ⅰ.每次申請之療程以3個月為限。 II.初次申請時需檢附 HER2為陰性之檢測報告、ER 和 PR 之檢測報告，以及 germline BRCA 1/2突變之檢測報告，且需符合全民健康保險藥品給付規定 之通則十二。 III.再次申請必須提出客觀證據（如：影像學）證實無惡化，才可繼續使用。 IV. 用於術後輔助治療，olaparib 與 pembrolizumab 僅能擇一給付。"}],"_title":"高復發早期乳癌 · gBRCA 輔助"},{"num":"5","header":"Olaparib 每日最多使用4粒","subitems":[]}],"per_cancer":{"婦癌":{"clauses":[{"num":"1","header":"卵巢、輸卵管或原發性腹膜癌(olaparib、niraparib)：(109/11/1、 111/6/1、","subitems":[{"num":"(1)","text":"單獨使用 olaparib 於具下列所有條件的病人做為維持治療，限用兩年： I.對第一線含鉑化療有治療反應後使用。 Ⅱ.具 germline or somatic BRCA 1/2致病性或疑似致病性突變。 Ⅲ.FIGO (International Federation of Gynecology and Obstetrics) Stage III or IV disease。"},{"num":"(2)","text":"單獨使用 niraparib 於具下列所有條件的病人做為維持治療，限用兩年： I.對第一線含鉑化療有治療反應後使用。 Ⅱ.檢測結果符合下列任一情形之病人： i.具 germline or somatic BRCA 1/2 致病性或疑似致病性突變病人。 ii.具同源重組缺陷(Homologous Recombination Deficient, HRD)陽性且 BRCA wild type 之高度惡性病人。 Ⅲ.FIGO (International Federation of Gynecology and Obstetrics) Stage III o deration of gynecology and obstetrics) stage iii or iv disease。 單獨使用 niraparib 於具下列所有條件的病人做為維持治療，限用兩年： i.對第一線含鉑化療有治療反應後使用。 ⅱ.檢測結果符合下列任一情形之病人： i.具 germline or somatic brca 1/2 致病性或疑似致病性突變病人。 ii.具同源重組缺陷(homologous recombination deficient, hrd)陽性且 brca wild type 之高度惡性病人。 ⅲ.figo (international federation of gynecology and obstetrics) stage iii or iv disease。 限 olaparib 併用 bevacizumab(限使用 alymsys、abevmy、vegzelma 或 mvasi)，使用於具下列所有條件的成年病人做為維持治療，限用兩年：： i.對第一線含鉑化療合併 bevacizumab 有反應(完全反應或部分反應)。 ⅱ.其癌症帶有下列任一定義的 dna 同源修復系統缺失 (homologous recombination deficiency, hrd)： i.致病性或疑似致病性 brca 突變。 ii.基因體不穩定(genomic instability)。 須經事前審查核准後使用：(109/11/1、111/6/1、111/8/1、113/6/1、 i.每次申請之療程以6個月為限。 ⅱ.初次申請時需檢附 germline or somatic brca 1/2突變檢測報告或 hrd 陽性 檢測報告，且需符合全民健康保險藥品給付規定之通則十二。 (111/6/1、 ⅲ.再次申請必須提出客觀證據（如：影像學）證實無惡化，才可繼續使用。 用於具 germline or somatic brca 1/2 致病性或疑似致病性突變時， olaparib 與 niraparib 僅能擇一使用，除因耐受不良，不得互換。(112/1/1、 倘因併用 bevacizumab 耐受性不良，在維持性治療可再換成 olaparib 單獨使 用，總療程數合併計算，限用兩年。 niraparib 使用時，體重大於(含)77公斤且基期血小板高於(含)15萬/ul，每 日最多使用300mg；體重小於77公斤或基期血小板低於15萬/ul，每日最多使用 200mg。 figo stage iv disease 具 germline or somatic brca 1/2致病性或疑似致病 性突變者，若已經申請 niraparib 用於第一線化學治療後維持性治療時不得另 外申請 bevacizumab 併用，除因 niraparib 耐受性不良，在維持性治療可再換 成 bevacizumab(除 zirabev 以外)單獨使用，總申請療程以17個療程為上限。 三陰性乳癌(olaparib、talazoparib)：(109/11/1、111/6/1、111/8/1、112/1/1、 olaparib 單獨使用於曾接受前導性、術後輔助性或轉移性化療，且具 germline brca 1/2致病性或疑似致病性突變之三陰性(荷爾蒙接受體及 her2 受體皆為陰性)轉移性乳癌病人。 talazoparib 限用於治療同時符合下列條件之18歲以上局部晚期或轉移性乳癌 病患： i.曾接受前導性、術後輔助性或轉移性化療者，或是無法接受化療者。 ⅱ.具 germline brca 1/2突變 ⅲ.第二型人類表皮生長因子接受體(her2)、雌激素受體(er)以及黃體素受體 (pr)均呈現陰性。 須經事前審查核准後使用：(109/11/1、111/6/1、111/8/1、112/1/1、 i.每次申請之療程以3個月為限。 ⅱ.初次申請時需檢附 er、pr、her2皆為陰性之檢測報告，以及 germline brca 1/2突變之檢測報告，且需符合全民健康保險藥品給付規定之通則十二。 ⅲ.再次申請必須提出客觀證據（如：影像學）證實無惡化，才可繼續使 用。 olaparib 與 talazoparib 僅得擇一使用，除因耐受性不良，不得互換。 去勢療法無效的轉移性攝護腺癌 (mcrpc) (olaparib)：（112/11/1、113/6/1、 單獨使用於具 germline or somatic brca 1/2致病性或疑似致病性突變且先前 接受過新荷爾蒙藥物(novel hormonal agents)治療後惡化之成人病人。 併用 abiraterone 及 prednisone 或 prednisolone，用於具 germlin etaxel 限使用6個療程，且須符合下列所有條件： Ⅰ.ECOG≦1。 Ⅱ.絕對嗜中性球計數≧1500/mm3。 Ⅲ.血小板計數≧100,000/mm3。 IV.GPT≦2倍之正常值上限。 V.Total bilirubin≦正常值上限。 VI.eGFR≧30mL/min/1.73m2"}],"_title":"mCSPC · 高風險（±docetaxel）"},{"num":"2","header":"治療高風險非轉移性去勢抗性前列腺癌(high risk nmCRPC)的成年男性。","subitems":[{"num":"(1)","text":"須經事前審查核准後使用。"},{"num":"(2)","text":"初次申請時需檢附病理報告、使用雄性素去除療法紀錄，系列 PSA 和睪固酮數 據，三個月內影像報告證明無遠端轉移。"},{"num":"(3)","text":"ECOG 分數須≦1。"},{"num":"(4)","text":"PSA doubling time≦10個月，PSA 倍增之時間，應依線性回歸模型計算，且其參 數取得需基於下列原則： Ⅰ.至少三個連續 PSA 測量值，且各測量值皆≧0.2 ng/mL（最高的 PSA 值必須 >1.0ng/ml）。 Ⅱ.應包含先前 ADT 治療期間的測量值，且最少一測量值為最近3個月內測得之 PSA 數值。 Ⅲ.第一個和最後一個 PSA 測量值間隔需≧8週，但≦12個月。"},{"num":"(5)","text":"每3個月需再次申請，申請之療程以3個月為限。再次申請時，有 PSA progression 者，需檢附影像學報告，若影像學報告證實轉移，則需停藥;無 PSA progression 者，則每6個月需檢附影像學報告，若影像學報告證實轉移，則需停 藥。 註： PSA progression 定義為:PSA 下降 達最低值(nadir)後，出現 PSA 值上升較 nadir≧25%，且 PSA≧2 ng/mL，並於至少3週後，再次抽血 確認 PSA 值有上升趨 勢。"}],"_title":"高風險 nmCRPC"},{"num":"3","header":"不論病人處於轉移或非轉移的狀態下，新型荷爾蒙藥品(abiraterone、 apalutamide、darolutamide 和 enzalutamide) ，及 olaparib 與 abiraterone 併 用，終生僅給付一種治療，且除非出現嚴重不耐受反應導致必須永久停止治療，不 得互換。","subitems":[]}],"per_cancer":null,"common_data":null,"st":"darolutamide nubeqa 作為單一療法或與 docetaxel 併用於治療高風險轉移性的去勢敏感性前列腺癌 (mcspc)，總療程以36個月為上限。 須經事前審查核准後使用。 每3個月需再次申請，再申請時若 psa 值下降未超過治療前的50%以上，則需停 藥。 下降達最低值後之持續追蹤出現 psa 較最低值上升50%以上且 psa≧2ng/ml，則需 停藥，但影像學證據尚無疾病進展者，可以繼續使用。 前述高風險需符合下列三項條件中至少兩項： ⅰ.葛里森分數(gleason score)≧8。 ⅱ. 骨骼掃描出現三個(含)以上病灶且至少其中一處以上為非脊柱及非骨盆腔轉 移。 ⅲ.出現內臟轉移。 與 docetaxel 併用，docetaxel 限使用6個療程，且須符合下列所有條件： ⅰ.ecog≦1。 ⅱ.絕對嗜中性球計數≧1500/mm3。 ⅲ.血小板計數≧100,000/mm3。 iv.gpt≦2倍之正常值上限。 v.total bilirubin≦正常值上限。 vi.egfr≧30ml/min/1.73m2 治療高風險非轉移性去勢抗性前列腺癌(high risk nmcrpc)的成年男性。 須經事前審查核准後使用。 初次申請時需檢附病理報告、使用雄性素去除療法紀錄，系列 psa 和睪固酮數 據，三個月內影像報告證明無遠端轉移。 ecog 分數須≦1。 psa doubling time≦10個月，psa 倍增之時間，應依線性回歸模型計算，且其參 數取得需基於下列原則： ⅰ.至少三個連續 psa 測量值，且各測量值皆≧0.2 ng/ml（最高的 psa 值必須 >1.0ng/ml）。 ⅱ.應包含先前 adt 治療期間的測量值，且最少一測量值為最近3個月內測得之 psa 數值。 ⅲ.第一個和最後一個 psa 測量值間隔需≧8週，但≦12個月。 每3個月需再次申請，申請之療程以3個月為限。再次申請時，有 psa progression 者，需檢附影像學報告，若影像學報告證實轉移，則需停藥;無 psa progression 者，則每6個月需檢附影像學報告，若影像學報告證實轉移，則需停 藥。 註： psa progression 定義為:psa 下降 達最低值(nadir)後，出現 psa 值上升較 nadir≧25%，且 psa≧2 ng/ml，並於至少3週後，再次抽血 確認 psa 值有上升趨 勢。 不論病人處於轉移或非轉移的狀態下，新型荷爾蒙藥品(abiraterone、 apalutamide、darolutamide 和 enzalutamide) ，及 olaparib 與 abiraterone 併 用，終生僅給付一種治療，且除非出現嚴重不耐受反應導致必須永久停止治療，不 得互換。"},{"num":"9.95","name":"Larotrectinib","brand":"Vitrakvi","cancers":["肺癌","大腸直腸癌","膽道癌","胰臟癌","其他癌"],"types":["標靶"],"pre_review":true,"form_no":"","items":[{"num":"1","header":"適用於有 NTRK 基因融合的實體腫瘤成人和兒童病人，並應符合以下條件：","subitems":[{"num":"(1)","text":"具 NTRK 基因融合且無已知的後天阻抗性突變(acquired resistance mutation)。"},{"num":"(2)","text":"為轉移性實體腫瘤，或手術切除極可能造成嚴重病症(severe morbidity)。"},{"num":"(3)","text":"沒有合適的替代治療選項(包含免疫檢查點抑制劑)。"}]},{"num":"2","header":"前述1.之兒童(未滿18 歲)病人，除了嬰兒纖維肉瘤可作為(含)一線以上使用外，其 餘適應症須為曾接受一線治療後無效或復發的病人。","subitems":[],"_title":"NTRK 融合實體瘤（兒童）"},{"num":"3","header":"前述1.之成人(≧18歲)病人，包括之適應症有:","subitems":[{"num":"(1)","text":"非小細胞肺癌: I.不適合接受化學治療之晚期非小細胞肺癌成人患者，非鱗狀癌者需為 EGFR/ALK/ROS-1 腫瘤基因原生型、鱗狀癌者需為 EGFR/ALK 腫瘤基因原生 型。 Ⅱ.先前已使用過 platinum 類化學治療失敗後，又有疾病惡化，且 EGFR/ALK 腫 瘤基因為原生型之晚期鱗狀非小細胞肺癌患者。 Ⅲ.先前已使用過 platinum 類及 docetaxel /paclitaxel 類二線(含)以上化學 治療均失敗，又有疾病惡化，且 EGFR/ALK/ROS-1 腫瘤基因為原生型之晚期非 小細胞肺腺癌患者。 Ⅳ.先前曾接受過至少一線 anti-EGFR TKI 治療失敗，且因 NTRK 基因融合對 anti-EGFR TKI 產生抗性之局部侵犯性或轉移性之 EGFR 突變非小細胞肺癌患 者。"},{"num":"(2)","text":"大腸直腸癌:先前已使用過 FOLFIRI（folinic acid/5- fluorouracil/irinotecan）或 FOLFOX（folinic acid/5- fluorouracil/oxaliplatin）治療失敗，又有疾病惡化之轉移性直腸結腸癌患 者。"},{"num":"(3)","text":"黑色素瘤:先前曾接受過至少一次全身性治療失敗，又有疾病惡化，且 BRAF 腫 瘤基因為原生型之無法手術切除或轉移的第三期或第四期黑色素瘤患者。"},{"num":"(4)","text":"胰臟癌:先前曾接受過至少一次全身性治療失敗，又有疾病惡化，無法手術切除 或轉移性胰臟癌患者。"},{"num":"(5)","text":"甲狀腺癌:用於放射性碘治療無效之局部晚期或轉移性的進行性 (progressive) 甲狀腺癌。"},{"num":"(6)","text":"惡性神經膠質瘤或退行性星狀細胞瘤:先前曾接受過標準放射線治療以及化學藥 物治療失敗之高度惡性神經膠質瘤(WHO 第4級)或退行性星狀細胞瘤(WHO 第3-4 級)。"},{"num":"(7)","text":"肝內膽管癌:先前曾接受過至少一次全身性治療失敗，又有疾病惡化，無法手術 切除或晚期或復發之膽道癌(含肝內膽管)病患。"},{"num":"(8)","text":"軟組織肉瘤:用於治療先前曾接受化療失敗的晚期軟組織肉瘤(STS)患者。其病 情若能接受手術治療者，須先經手術治療。"},{"num":"(9)","text":"胃腸道基質瘤 LN 且 bilirubin <2.5mg；Gilbert-Meulengracht syndrome 患者須符合 total bilirubin is ≤ 3.0 x ULN 且 direct bilirubin ≤ 1.5 x ULN。 Ⅳ.心臟功能: 左心室射出率 > 50%，沒有心包膜積液，且過去一年無任何重大心 臟疾病。 Ⅴ.肺功能:血氧 > 92% on room air (需有兩次以上的醫療紀錄)。"}],"_title":"R/R B-ALL · CAR-T（≤25 歲）"},{"num":"2","header":"治療經二線或二線以上全身治療後之復發性或難治性瀰漫性大 B 細胞淋巴瘤 （DLBCL）的成人病人。且需符合以下條件:","subitems":[{"num":"(1)","text":"經自體造血幹細胞移植後疾病復發或惡化（不論其後續治療處於完全緩解、部分 緩解或疾病惡化）。"},{"num":"(2)","text":"或需經過具有骨髓移植訓練的骨髓移植專科醫師確認無法進行造血幹細胞移植 者，無法進行造血幹細胞移植之定義，符合以下五個條件之一：(112/11/1、 Ⅰ.年齡75歲以上。 Ⅱ.年齡70歲以上且 HCT-CI 分數在1分或以上。 Ⅲ.年齡65歲以上且 HCT-CI 分數在2分或以上。 Ⅳ.HCT-CI 分數在4分或以上。 Ⅴ.經收集自體造血幹細胞2次後仍無法收集超過2*106 CD34+細胞/公斤。"},{"num":"(3)","text":"病人預期壽命至少3個月以上，且符合以下條件: Ⅰ. ECOG<2 (需有3次以上之醫療紀錄)。 Ⅱ Extranodal site ≤ 3 (需有 PET 或 CT 的影像報告)。 Ⅲ. 腎功能:腎絲球過濾速率 Estimated Glomerular Filtration Rate (eGFR) ≥ 60 mL/min/1.73 m2或肌酸酐 creatinine ≤1.5 x ULN。 Ⅳ. 肝功能: ALT ≤ 5 x ULN 且 bilirubin <2.5mg；Gilbert-Meulengracht syndrome 患者須符合 total bilirubin is ≤ 3.0 x ULN 且 direct bilirubin ≤ 1.5 x ULN。 Ⅴ. 心臟功能: 左心室射出率 > 50%且過去一年無任何重大心臟疾病(包含但 不限於不穩定心絞痛、心肌梗塞、冠狀動脈繞道手術、中風) 。 Ⅵ. 肺功能:血氧 > 92% on room air (需有兩次以上的醫療紀錄)。 Ⅶ. 淋巴球收集時，患者須符合全血細胞計數標準: ANC≧1000/uL、 ALC≧100/uL、Hb≧8.0 g/dL; Plt≧50000/uL。 Ⅷ.於治療前兩年任何無自體免疫疾病。 Ⅸ. 無 DLBCL 之外的併發惡性腫瘤，但充分治療的基底細胞癌或鱗狀細胞癌不 在此限（申請時需要充分的傷口癒合）；若為子宮頸或乳腺癌原位癌，在 申請前至少 3 年經過治愈性治療且無復發證據；原發惡性腫瘤已完全切 除且申請時須處於完全緩解5年以上。"}],"_title":"R/R DLBCL · CAR-T"},{"num":"3","header":"前述1、2項均須符合下列條件：","subitems":[{"num":"(1)","text":"需證實癌細胞仍帶有 CD19。"},{"num":"(2)","text":"終身限給付1次療程，須於特殊專案審查通過後6個月內完成輸注。"},{"num":"(3)","text":"病人不得有 HIV 感染，曾經感染但已控制之病人亦不得接受。"},{"num":"(4)","text":"病人不得有 active hepatitis B virus or hepatitis C virus 感染(評估和輸 注 CAR-T 時需為 viral load undetectable)。"},{"num":"(5)","text":"病人不得有原發性中樞神經系統淋巴瘤(Primary CNS 1ymphoma)。"},{"num":"(6)","text":"病人不得有活躍的次發性中樞神經系統淋巴癌侵犯。"},{"num":"(7)","text":"追蹤方式：依保險人公布要求之檢驗項目與頻率執行。"},{"num":"(8)","text":"應提供本藥品治療申請日2個月內腦部 MRI 報告，無法進行腦部 MRI 檢查者，應 提供1個月內腦脊髓液檢查報告與 CT 檢查報告並需照會神經科醫師，證明無淋巴 瘤中樞神經侵犯。"},{"num":"(9)","text":"併用藥品規範：不得併用化療藥(淋巴清除化療除外)、免疫抑制劑或 過2*106 cd34+細胞/公斤。 病人預期壽命至少3個月以上，且符合以下條件: ⅰ. ecog<2 (需有3次以上之醫療紀錄)。 ⅱ extranodal site ≤ 3 (需有 pet 或 ct 的影像報告)。 ⅲ. 腎功能:腎絲球過濾速率 estimated glomerular filtration rate (egfr) ≥ 60 ml/min/1.73 m2或肌酸酐 creatinine ≤1.5 x uln。 ⅳ. 肝功能: alt ≤ 5 x uln 且 bilirubin <2.5mg；gilbert-meulengracht syndrome 患者須符合 total bilirubin is ≤ 3.0 x uln 且 direct bilirubin ≤ 1.5 x uln。 ⅴ. 心臟功能: 左心室射出率 > 50%且過去一年無任何重大心臟疾病(包含但 不限於不穩定心絞痛、心肌梗塞、冠狀動脈繞道手術、中風) 。 ⅵ. 肺功能:血氧 > 92% on room air (需有兩次以上的醫療紀錄)。 ⅶ. 淋巴球收集時，患者須符合全血細胞計數標準: anc≧1000/ul、 alc≧100/ul、hb≧8.0 g/dl; plt≧50000/ul。 ⅷ.於治療前兩年任何無自體免疫疾病。 ⅸ. 無 dlbcl 之外的併發惡性腫瘤，但充分治療的基底細胞癌或鱗狀細胞癌不 在此限（申請時需要充分的傷口癒合）；若為子宮頸或乳腺癌原位癌，在 申請前至少 3 年經過治愈性治療且無復發證據；原發惡性腫瘤已完全切 除且申請時須處於完全緩解5年以上。 前述1、2項均須符合下列條件： 需證實癌細胞仍帶有 cd19。 終身限給付1次療程，須於特殊專案審查通過後6個月內完成輸注。 病人不得有 hiv 感染，曾經感染但已控制之病人亦不得接受。 病人不得有 active hepatitis b virus or hepatitis c virus 感染(評估和輸 注 car-t 時需為 viral load undetectable)。 病人不得有原發性中樞神經系統淋巴瘤(primary cns 1ymphoma)。 病人不得有活躍的次發性中樞神經系統淋巴癌侵犯。 追蹤方式：依保險人公布要求之檢驗項目與頻率執行。 應提供本藥品治療申請日2個月內腦部 mri 報告，無法進行腦部 mri 檢查者，應 提供1個月內腦脊髓液檢查報告與 ct 檢查報告並需照會神經科醫師，證明無淋巴 瘤中樞神經侵犯。 併用藥品規範：不得併用化療藥(淋巴清除化療除外)、免疫抑制劑或標靶藥物。 執行醫師須完全符合下列資格： 醫師必須為血液病和造血幹細胞移植專科醫師且須完成血液病和造血幹細胞移植 的相關照護訓練。 每兩年接受至少6小時中華民國血液及骨髓移植學會或中華民國血液病學會舉辦 之 car-t 教育訓練。 由保險人每年委託相關學會定期稽核醫師資格。 執行醫院須完全符合下列條件： 須為血液病和造血幹細胞移植專科醫師的訓練醫院。 每年平均須進行20例以上造血幹細胞移植，以過去3年平均為準，並每年進行確 認。 須建立 car-t 多專科團隊，包含醫師、護理師、藥師、醫檢師、細胞蒐集專門技 術人員，經團隊討論後同意治療，並須於事前審查時，檢附會議紀錄。 car-t 多專科團隊成員，包括醫師、護理師、藥師、醫檢師、細胞蒐集專門技術 人員各至少一人，須每兩年接受至少6小時中華民國血液及骨髓移植學會或中華 民國血液病學會舉辦之 car-t 教育訓練。 醫院藥局至少需庫存10支靜脈注射 tocilizumab。 細胞蒐集和處理實驗室須於2029年1月1日前取得相關國際認證(aabb 或 fact- jacie)。 由保險人每年委託相關學會定期稽核醫院符合前述條件。 須經專家小組特殊專案審查核准後使用，並須檢附下列文件： car-t 多科團隊會議紀錄。 符合前述第4、5項之醫院條件及醫師資格之相關文件。 經臨床醫師確認無法接受造血幹細胞移植者，須檢附相關文件。"},{"num":"9.104","name":"Zanubrutinib","brand":"Brukinsa","cancers":["血液淋巴癌"],"types":["標靶"],"pre_review":true,"form_no":"","items":[{"num":"1","header":"單獨使用於先前接受過至少一種化學或標靶治療方式無效或復發的被套細胞淋巴瘤成 年病人。","subitems":[{"num":"(1)","text":"需經事前審查核准後使用(事審代碼：C83N2)。首次申請事前審查之療程以4個月為 限，之後每3個月需再次申請，再次申請時應檢附前次治療結果評估資料，如影像學 檢查報告 .周邊血液中漿細胞比例≧20%或漿細胞絕對值≧2000 cells/μl。 ⅲ.出現下列任一臨床症狀： ⅰ.新產生的 bone lesion(s)或 plasmacytoma；且須經病理切片證實。 ⅱ.plasmacytoma 體積增加≧50%。 iii.高血鈣(corrected serum calcium＞11.0 mg/dl 或 2.75 mmol/l)。 iv.貧血(hemoglobin 下降幅度≧ 2gm/dl 且無其他原因可以解釋)。 v.腎功能惡化(egfr 需下降幅度≧25%)，且無其他原因可以解釋。 vi.出現其他 end-organ dysfunctions。 之後申請則為每次4次輸注，申請時必須確定 paraprotein (m-protein)未上升(即 表示對藥物有反應或為穩定狀態)，或對部分 non-secretory type mm 病人以骨髓檢 查 plasma cell 為療效依據，方可繼續使用。 每位病人終生限給付26次輸注。 除 carfilzomib 外，本案藥品不得與其他蛋白酶體抑制劑(proteasome inhibitor)或 免疫調節劑(immunomodulatory drugs)併用。 isatuximab 與 daratumumab 二者僅能擇一使用，除因藥物耐受不良以外，不可以其他 原因申請互換使用。"},{"num":"9.109","name":"Enfortumab vedotin","brand":"Padcev","cancers":["泌尿癌"],"types":["標靶"],"pre_review":true,"form_no":"","items":[{"num":"1","header":"適用於先前接受過含鉑化學治療，後續接受免疫檢查點抑制劑(如 atezolizumab； nivolumab；pembrolizumab；avelumab；ipilimumab 製劑)治療失敗後疾病惡化的局 部晚期或轉移性泌尿道上皮癌成人病人，須檢附接受過含鉑化學治療之病歷報告。","subitems":[],"_title":"泌尿道上皮癌 · 含鉑＋免疫後（三線）"},{"num":"2","header":"使用條件：","subitems":[{"num":"(1)","text":"病人身體狀況良好（ECOG≦2）且預期壽命至少3個月以上。"},{"num":"(2)","text":"病人之心肺與肝腎功能須符合下列所有條件： I.NYHA(the New York Heart Association) Functional Class I 或 II。 II.GOT<60U/L 及 GPT<60U/L，且 T-bilirubin<1.5mg/dL。 III.腎功能: eGFR>30mL/min /1.73m 。"},{"num":"(3)","text":"無中樞神經系統(CNS)轉移。"},{"num":"(4)","text":"需排除病情控制不佳的糖尿病患者（HbA1c≧8%）。"}]},{"num":"3","header":"須經事前審查核准後使用。初次申請時需檢附以下資料：","subitems":[{"num":"(1)","text":"病人身體狀況良好(ECOG≦2)及心肺與肝腎功能之評估資料。"},{"num":"(2)","text":"病人12週內之疾病影像檢查及報告(如胸部 X 光、電腦斷層或其他可作為評估的 影像)，此影像證明以可測量(measurable)的病灶為優先，如沒有可以測量的病灶， 則可評估(evaluable)的病灶亦可採用。"},{"num":"(3)","text":"其他佐證病歷資料。"}]},{"num":"4","header":"每次申請事前審查以3個療程為限，再次申請時需檢附療效評估資料，若病情惡化即 不得再次申請，無效後或給付時程期滿後則不再給付該適應症相關之標靶藥物及免 疫檢查點抑制劑。","subitems":[]},{"num":"5","header":"每位病人限給付6個療程。","subitems":[]}],"per_cancer":null,"common_data":null,"st":"enfortumab vedotin padcev 適用於先前接受過含鉑化學治療，後續接受免疫檢查點抑制劑(如 atezolizumab； nivolumab；pembrolizumab；avelumab；ipilimumab 製劑)治療失敗後疾病惡化的局 部晚期或轉移性泌尿道上皮癌成人病人，須檢附接受過含鉑化學治療之病歷報告。 使用條件： 病人身體狀況良好（ecog≦2）且預期壽命至少3個月以上。 期乳癌治療結束至首次疾病復發轉移時間超過12個月以上者 得再次申請。"},{"num":"9.113","name":"Gemtuzumab ozogamicin","brand":"Mylotarg","cancers":["血液淋巴癌"],"types":["標靶"],"pre_review":true,"form_no":"","items":[{"num":"1","header":"限用於新診斷原發型 CD33陽性的急性骨髓性白血病(AML)病人之標準前導與鞏固性化 療時合併使用，且完全符合下列條件：","subitems":[{"num":"(1)","text":"需為細胞遺傳學風險等級較佳(favorable)的病人。"},{"num":"(2)","text":"排除急性前骨髓性細胞白血病(acute promyelocytic leukemia,APL)病人。"}],"_title":"新診斷 CD33+ AML · favorable"},{"num":"2","header":"需經事前審查核准後使用，用於誘導期時，以1個療程(3次輸注)為限，並需合併標 準3+7緩解誘導化療使用。","subitems":[]},{"num":"3","header":"若病患疾病達到完全緩解(即 CR 或 CRi)，可續申請使用於鞏固治療期，每次申請以 1個療程為限(1次輸注)，並最多給付2個鞏固治療療程(即2次輸注)。申請時需檢附 前次治療結果評估資料證實無疾病惡化。","subitems":[]},{"num":"4","header":"每人以給付5次輸注為上限。","subitems":[]}],"per_cancer":null,"common_data":null,"st":"gemtuzumab ozogamicin mylotarg 限用於新診斷原發型 cd33陽性的急性骨髓性白血病(aml)病人之標準前導與鞏固性化 療時合併使用，且完全符合下列條件： 需為細胞遺傳學風險等級較佳(favorable)的病人。 排除急性前骨髓性細胞白血病(acute promyelocytic leukemia,apl)病人。 需經事前審查核准後使用，用於誘導期時，以1個療程(3次輸注)為限，並需合併標 準3+7緩解誘導化療使用。 若病患疾病達到完全緩解(即 cr 或 cri)，可續申請使用於鞏固治療期，每次申請以 1個療程為限(1次輸注)，並最多給付2個鞏固治療療程(即2次輸注)。申請時需檢附 前次治療結果評估資料證實無疾病惡化。 每人以給付5次輸注為上限。"},{"num":"9.114","name":"Fedratinib","brand":"Inrebic","cancers":["血液淋巴癌"],"types":["標靶"],"pre_review":true,"form_no":"","items":[{"num":"1","header":"用於未曾接受 Janus 激酶抑制劑（JAK inhibitor）治療或曾接受 ruxolitinib 治療後 不耐受或有禁忌症，且為 International Working Group（IWG）Consensus Criteria 中度風險或高風險之骨髓纖維化，包括原發性骨髓纖維化、真性紅血球增多症後骨髓纖 維化、或血小板增多症後骨髓纖維化等疾病所造成脾臟腫大（symptomatic splenomegaly）及/或其他相關全身症狀且不適於接受幹細胞移植的成人病人（stem cell transplantation）。","subitems":[{"num":"(1)","text":"需經事前審查核准後使用，每次申請之療程以6個月為限，送審時需檢送影像資料及 症狀改善之病歷紀錄，每6個月評估一次。"},{"num":"(2)","text":"用藥後第一次評估時，需達到症狀反應(symptom response)或脾臟體積無惡化兩者 之一，且同時無 AML tranformation，方得以繼續使用。分別定義如下： Ⅰ.症狀反應：MPN-SAF-TSS 分數或 MPN-10與治療前基準值相比，需下降超過 50%。 Ⅱ.脾臟體積無惡化：使用電腦斷層評估，脾臟長度未增加超過治療前基準值之 40%以上(或體積增加未達25%以上)。 Ⅲ.AML transformation：骨髓中之芽細胞≥20%或血液中之芽細胞≥20%合併芽細胞 數值≥1×10 /L。"},{"num":"(3)","text":"用藥後第二次及其後的評估，必須顯示無疾病惡化（無症狀惡化且脾臟體積無惡 化，並同時無 AML transformation），方得以繼續使用。分別定義如下： Ⅰ.無症狀惡化：未出現新症狀，且 MPN-SAF-TSS 分數或 MPN-10未超過治療前的基 準值。 Ⅱ.脾臟體積無惡化：使用電腦斷層評估，脾臟長度未增加超過最佳反應(best response)時之脾臟長度40%以上(或體積增加未達25%以上)。 Ⅲ.AML transformation：骨髓中之芽細胞≥20%或血液中之芽細胞≥20%合併芽細胞 數值≥1×109/L。"}],"_title":"骨髓纖維化 · JAK naïve／ruxo 後"},{"num":"2","header":"本藥品與 ruxolitinib、momelotinib 用於中度風險或高風險之骨髓纖維化治療時， 僅得擇一給付。ruxolitinib、momelotinib 治療後如疾病惡化不得換用本藥品。","subitems":[]}],"per_cancer":null,"common_data":null,"st":"fedratinib inrebic 用於未曾接受 janus 激酶抑制劑（jak inhibitor）治療或曾接受 ruxolitinib 治療後 不耐受或有禁忌症，且為 international working group（iwg）consensus criteria 中度風險或高風險之骨髓纖維化，包括原發性骨髓纖維化、真性紅血球增多症後骨髓纖 維化、或血小板增多症後骨髓纖維化等疾病所造成脾臟腫大（symptomatic splenomegaly）及/或其他相關全身症狀且不適於接受幹細胞移植的成人病人（stem cell transplantation）。 需經事前審查核准後使用，每次申請之療程以6個月為限，送審時需檢送影像資料及 症狀改善之病歷紀錄，每6個月評估一次。 用藥後第一次評估時，需達到症狀反應(symptom response)或脾臟體積無惡化兩者 之一，且同時無 aml tranformation，方得以繼續使用。分別定義如下： ⅰ.症狀反應：mpn-saf-tss 分數或 mpn-10與治療前基準值相比，需下降超過 50%。 ⅱ.脾臟體積無惡化：使用電腦斷層評估，脾臟長度未增加超過治療前基準值之 40%以上(或體積增加未達25%以上)。 ⅲ.aml transformation：骨髓中之芽細胞≥20%或血液中之芽細胞≥20%合併芽細胞 數值≥1×10 /l。 用藥後第二次及其後的評估，必須顯示無疾病惡化（無症狀惡化且脾臟體積無惡 化，並同時無 aml transformation），方得以繼續使用。分別定義如下： ⅰ.無症狀惡化：未出現新症狀，且 mpn-saf-tss 分數或 mpn-10未超過治療前的基 準值。 ⅱ.脾臟體積無惡化：使用電腦斷層評估，脾臟長度未增加超過最佳反應(best response)時之脾臟長度40%以上(或體積增加未達25%以上)。 ⅲ.aml transformation：骨髓中之芽細胞≥20%或血液中之芽細胞≥20%合併芽細胞 數值≥1×109/l。 本藥品與 ruxolitinib、momelotinib 用於中度風險或高風險之骨髓纖維化治療時， 僅得擇一給付。ruxolitinib、momelotinib 治療後如疾病惡化不得換用本藥品。"},{"num":"9.115","name":"Trastuzumab deruxtecan","brand":"Enhertu","cancers":["乳癌"],"types":["標靶"],"pre_review":true,"form_no":"","items":[{"num":"1","header":"單獨使用於具 HER2過度表現(IHC3+或 FISH+)之轉移性乳癌病人作為二線治療，並同 時符合下列情形：","subitems":[{"num":"(1)","text":"之前分別接受過 trastuzumab 與一種 taxane 藥物治療，或其合併療法，或 pertuzumab 與 trastuzumab 與一種 taxane 藥物治療。"},{"num":"(2)","text":"之前已經接受過轉移性癌症治療，或在輔助療法治療期間或完成治療後6 個月內 癌症復發。"},{"num":"(3)","text":"合併有主要臟器(不包含骨及軟組織)轉移。"},{"num":"(4)","text":"須經事前審查核准後使用，核准後每12週須檢附療效評估資料再次申請，若疾病 有惡化情形即不應再行申請，每位病人至多給付18個療程為上限。"},{"num":"(5)","text":"Trastuzumab deruxtecan、trastuzumab emtansine 和 lapatinib 僅能擇一給付， 不得互換。"}
